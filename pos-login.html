<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>樂樂山 POS 員工登入</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/pos-login.css">
</head>
<body>
  <div class="pl-bg-grid"></div>

  <main class="pl-shell">
    <section class="pl-panel" aria-labelledby="pl-title">
      <!-- Brand -->
      <div class="pl-brand">
        <div class="pl-brand-name">
          <span class="pl-brand-mark"></span>樂樂山 湯滷川味
        </div>
        <div class="pl-brand-sub" id="pl-title">POS 員工登入</div>
      </div>

      <form id="pos-login-form" novalidate>
        <!-- Display fields -->
        <div class="pl-fields" id="pl-fields">
          <div class="pl-field">
            <div class="pl-field-label">員工編號</div>
            <input
              id="employee-id"
              class="pl-input"
              type="text"
              inputmode="numeric"
              maxlength="3"
              autocomplete="username"
              placeholder="例：001"
              readonly
            >
          </div>
          <div class="pl-field">
            <div class="pl-field-label">PIN</div>
            <input
              id="employee-pin"
              class="pl-input"
              type="password"
              inputmode="numeric"
              maxlength="4"
              autocomplete="current-password"
              placeholder="4位"
              readonly
            >
          </div>
        </div>

        <!-- Numpad -->
        <div class="pl-numpad" id="pl-numpad">
          <button type="button" class="pl-key" data-digit="1">1</button>
          <button type="button" class="pl-key" data-digit="2">2</button>
          <button type="button" class="pl-key" data-digit="3">3</button>
          <button type="button" class="pl-key" data-digit="4">4</button>
          <button type="button" class="pl-key" data-digit="5">5</button>
          <button type="button" class="pl-key" data-digit="6">6</button>
          <button type="button" class="pl-key" data-digit="7">7</button>
          <button type="button" class="pl-key" data-digit="8">8</button>
          <button type="button" class="pl-key" data-digit="9">9</button>
          <button type="button" class="pl-key pl-key--del" id="pl-key-del">⌫</button>
          <button type="button" class="pl-key" data-digit="0">0</button>
          <button type="button" class="pl-key pl-key--confirm" id="pl-key-confirm">✓</button>
        </div>

        <button id="pos-login-submit" class="pl-submit" type="submit">登入</button>
      </form>

      <div id="pos-login-error" class="pl-error hidden"></div>
    </section>

    <footer class="pl-footer" id="pl-footer">
      leleshan-system.web.app
    </footer>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-functions-compat.js"></script>
  <script src="/config.public.js?v=20260413-1"></script>
  <script src="/pos-session.js?v=20260414-1"></script>
  <script src="/pos-login.js?v=20260423-w5c"></script>
</body>
</html>
