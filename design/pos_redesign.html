<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>火鍋 POS · 現場點餐</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:    #0a0b10;
    --bg-base:    #111319;
    --bg-elev-1:  #181b24;
    --bg-elev-2:  #20242f;
    --bg-elev-3:  #2a2f3d;
    --line:       #262a36;
    --line-soft:  #1d212b;
    --text-hi:    #f5f1e8;
    --text-mid:   #a7a89f;
    --text-low:   #6b6e79;
    --accent:     #ff8a3d;       /* warm ember */
    --accent-2:   #ffb347;       /* amber glow */
    --accent-deep:#c55a1a;
    --success:    #7dd67b;
    --danger:     #ff5b5b;
    --shadow-card: 0 1px 0 rgba(255,255,255,.03) inset, 0 8px 24px -12px rgba(0,0,0,.6);
    --shadow-pop:  0 20px 50px -20px rgba(255,138,61,.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg-deep);
    color: var(--text-hi);
    font-family: "Noto Sans TC", system-ui, sans-serif;
    font-feature-settings: "palt" 1;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* background atmosphere */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% 0%, rgba(255,138,61,.08), transparent 60%),
      radial-gradient(ellipse 60% 50% at 90% 100%, rgba(197,90,26,.06), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 220px 1fr 360px;
    height: 100vh;
    gap: 0;
  }

  /* ========== SIDEBAR ========== */
  .sidebar {
    background: var(--bg-base);
    border-right: 1px solid var(--line-soft);
    display: flex;
    flex-direction: column;
    padding: 22px 14px;
    overflow-y: auto;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 6px 10px 20px;
    border-bottom: 1px solid var(--line-soft);
    margin-bottom: 18px;
  }
  .brand-mark {
    font-family: "Noto Serif TC", serif;
    font-weight: 900;
    font-size: 28px;
    color: var(--accent);
    letter-spacing: -1px;
    line-height: 1;
  }
  .brand-sub {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    color: var(--text-low);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .side-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2.5px;
    color: var(--text-low);
    text-transform: uppercase;
    padding: 0 12px 10px;
  }

  .cat-nav {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .cat-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    color: var(--text-mid);
    font-size: 14px;
    font-weight: 500;
    transition: all .18s ease;
    border: 1px solid transparent;
    user-select: none;
  }
  .cat-item:hover {
    background: var(--bg-elev-1);
    color: var(--text-hi);
  }
  .cat-item.active {
    background: linear-gradient(180deg, rgba(255,138,61,.18), rgba(255,138,61,.06));
    color: var(--accent-2);
    border-color: rgba(255,138,61,.25);
  }
  .cat-icon {
    width: 26px; height: 26px;
    display: grid; place-items: center;
    font-size: 16px;
    border-radius: 7px;
    background: var(--bg-elev-2);
    flex-shrink: 0;
  }
  .cat-item.active .cat-icon {
    background: rgba(255,138,61,.18);
  }
  .cat-count {
    margin-left: auto;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    color: var(--text-low);
    font-weight: 500;
  }

  .sidebar-footer {
    margin-top: auto;
    padding: 14px 10px;
    border-top: 1px solid var(--line-soft);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .shift-card {
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    padding: 10px 12px;
    border-radius: 10px;
  }
  .shift-label {
    font-size: 10px;
    color: var(--text-low);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .shift-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-hi);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .shift-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 8px var(--success);
  }
  .shift-actions {
    display: flex;
    gap: 6px;
  }
  .shift-btn {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text-mid);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all .15s;
  }
  .shift-btn:hover { background: var(--bg-elev-1); color: var(--text-hi); }

  /* ========== MAIN ========== */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg-deep);
  }

  .topbar {
    padding: 20px 28px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    border-bottom: 1px solid var(--line-soft);
  }

  .topbar-left h1 {
    font-family: "Noto Serif TC", serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .topbar-left h1::before {
    content: "";
    width: 4px; height: 22px;
    background: var(--accent);
    border-radius: 2px;
  }
  .topbar-left .meta {
    margin-top: 4px;
    margin-left: 14px;
    font-size: 12px;
    color: var(--text-low);
    font-family: "JetBrains Mono", monospace;
    letter-spacing: .5px;
  }
  .topbar-left .meta span { color: var(--text-mid); }

  .search {
    flex: 1;
    max-width: 380px;
    position: relative;
  }
  .search input {
    width: 100%;
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    padding: 11px 16px 11px 40px;
    border-radius: 10px;
    color: var(--text-hi);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border .15s;
  }
  .search input:focus { border-color: var(--accent); }
  .search input::placeholder { color: var(--text-low); }
  .search-icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-low);
    font-size: 15px;
  }

  .tab-row {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0 28px;
    border-bottom: 1px solid var(--line-soft);
    background: var(--bg-deep);
  }
  .tab {
    padding: 14px 18px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-mid);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .15s;
    user-select: none;
  }
  .tab:hover { color: var(--text-hi); }
  .tab.active {
    color: var(--accent-2);
    border-bottom-color: var(--accent);
  }
  .tab-badge {
    display: inline-block;
    margin-left: 6px;
    padding: 1px 7px;
    border-radius: 10px;
    background: var(--bg-elev-2);
    font-size: 11px;
    font-family: "JetBrains Mono", monospace;
  }

  .flavor-bar {
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--line-soft);
    flex-wrap: wrap;
  }
  .flavor-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-low);
    text-transform: uppercase;
    margin-right: 4px;
  }
  .flavor-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 14px;
    border-radius: 999px;
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-mid);
    cursor: pointer;
    transition: all .15s;
  }
  .flavor-chip:hover { color: var(--text-hi); border-color: var(--bg-elev-3); }
  .flavor-chip.active {
    background: linear-gradient(180deg, rgba(255,138,61,.2), rgba(255,138,61,.08));
    border-color: var(--accent);
    color: var(--accent-2);
  }
  .flavor-chip .num {
    font-family: "JetBrains Mono", monospace;
    font-weight: 700;
    font-size: 12px;
  }
  .flavor-chip.add {
    border-style: dashed;
    color: var(--accent);
    background: transparent;
  }
  .apply-btn {
    margin-left: auto;
    padding: 7px 14px;
    border-radius: 8px;
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    color: var(--text-mid);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
  }
  .apply-btn:hover { color: var(--text-hi); }

  .menu-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 22px 28px 60px;
  }
  .menu-scroll::-webkit-scrollbar { width: 8px; }
  .menu-scroll::-webkit-scrollbar-track { background: transparent; }
  .menu-scroll::-webkit-scrollbar-thumb { background: var(--bg-elev-2); border-radius: 4px; }

  .cat-section { margin-bottom: 28px; scroll-margin-top: 10px; }

  .cat-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line-soft);
  }
  .cat-header h2 {
    font-family: "Noto Serif TC", serif;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: -.3px;
  }
  .cat-header .cat-en {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    color: var(--text-low);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .cat-header .cat-rule {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--line) 0%, transparent 100%);
    align-self: center;
  }
  .cat-header .cat-cnt {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    color: var(--text-low);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(168px, 1fr));
    gap: 10px;
  }

  .item {
    position: relative;
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 14px 12px;
    cursor: pointer;
    transition: all .18s ease;
    overflow: hidden;
    user-select: none;
    min-height: 108px;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow-card);
  }
  .item::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 80% -20%, rgba(255,138,61,.12), transparent 60%);
    opacity: 0;
    transition: opacity .2s;
    pointer-events: none;
  }
  .item:hover {
    border-color: rgba(255,138,61,.35);
    transform: translateY(-1px);
    background: var(--bg-elev-2);
  }
  .item:hover::before { opacity: 1; }
  .item:active { transform: translateY(0); }

  .item.popular::after {
    content: "熱";
    position: absolute;
    top: 10px; right: 10px;
    width: 18px; height: 18px;
    display: grid; place-items: center;
    font-size: 10px;
    font-weight: 700;
    border-radius: 6px;
    background: linear-gradient(180deg, #ff5b3d, #c93a1a);
    color: #fff;
    box-shadow: 0 4px 10px rgba(255,91,61,.5);
  }

  .item-emoji {
    font-size: 24px;
    line-height: 1;
    margin-bottom: 10px;
    filter: saturate(1.1);
    display: block;
  }
  .item-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-hi);
    line-height: 1.3;
    margin-bottom: auto;
  }
  .item-bottom {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px dashed var(--line);
  }
  .item-price {
    font-family: "JetBrains Mono", monospace;
    font-size: 15px;
    font-weight: 700;
    color: var(--accent-2);
  }
  .item-price .cur {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-low);
    margin-right: 2px;
  }
  .item-add {
    width: 24px; height: 24px;
    border-radius: 7px;
    background: var(--bg-elev-3);
    border: none;
    color: var(--text-hi);
    font-size: 18px;
    line-height: 1;
    display: grid; place-items: center;
    cursor: pointer;
    transition: all .15s;
  }
  .item:hover .item-add {
    background: var(--accent);
    color: #1a0d00;
    transform: scale(1.08);
  }

  /* combo card - stands out */
  .item.combo {
    background: linear-gradient(145deg, rgba(255,138,61,.12), var(--bg-elev-1) 70%);
    border-color: rgba(255,138,61,.25);
  }
  .item.combo .item-emoji { font-size: 28px; }

  /* ========== CART ========== */
  .cart {
    background: var(--bg-base);
    border-left: 1px solid var(--line-soft);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .cart-head {
    padding: 24px 22px 16px;
    border-bottom: 1px solid var(--line-soft);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .cart-head h2 {
    font-family: "Noto Serif TC", serif;
    font-size: 18px;
    font-weight: 900;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .cart-head h2::before {
    content: "";
    width: 4px; height: 18px;
    background: var(--accent);
    border-radius: 2px;
  }
  .cart-clear {
    font-size: 12px;
    color: var(--text-low);
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    padding: 6px 10px;
    border-radius: 6px;
  }
  .cart-clear:hover { color: var(--danger); background: var(--bg-elev-1); }

  .cart-items {
    flex: 1;
    overflow-y: auto;
    padding: 10px 22px;
  }
  .cart-items::-webkit-scrollbar { width: 6px; }
  .cart-items::-webkit-scrollbar-thumb { background: var(--bg-elev-2); border-radius: 3px; }

  .cart-empty {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--text-low);
    gap: 14px;
    padding: 40px 20px;
  }
  .cart-empty-ico {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: var(--bg-elev-1);
    display: grid; place-items: center;
    font-size: 26px;
    opacity: .5;
  }
  .cart-empty-txt { font-size: 13px; }
  .cart-empty-hint { font-size: 11px; color: var(--text-low); }

  .cart-line {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px 14px;
    padding: 14px 0;
    border-bottom: 1px dashed var(--line-soft);
    align-items: center;
  }
  .cart-line:last-child { border-bottom: none; }
  .cart-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-hi);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cart-name .emj { font-size: 15px; }
  .cart-sub {
    font-size: 11px;
    color: var(--text-low);
    font-family: "JetBrains Mono", monospace;
    grid-column: 1;
  }
  .cart-qty {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--bg-elev-1);
    border: 1px solid var(--line);
    padding: 3px;
    border-radius: 8px;
  }
  .qty-btn {
    width: 22px; height: 22px;
    border-radius: 5px;
    background: transparent;
    border: none;
    color: var(--text-mid);
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    display: grid; place-items: center;
  }
  .qty-btn:hover { background: var(--bg-elev-3); color: var(--text-hi); }
  .qty-val {
    min-width: 20px;
    text-align: center;
    font-family: "JetBrains Mono", monospace;
    font-weight: 700;
    font-size: 13px;
  }
  .cart-price {
    font-family: "JetBrains Mono", monospace;
    font-weight: 700;
    font-size: 14px;
    color: var(--accent-2);
    grid-column: 2;
    text-align: right;
  }

  .cart-foot {
    border-top: 1px solid var(--line-soft);
    padding: 18px 22px 22px;
    background: linear-gradient(180deg, transparent, rgba(255,138,61,.04));
  }
  .cart-stats {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
    font-size: 13px;
  }
  .cart-stats .row {
    display: flex;
    justify-content: space-between;
    color: var(--text-mid);
  }
  .cart-stats .row.total {
    margin-top: 8px;
    padding-top: 10px;
    border-top: 1px solid var(--line-soft);
    color: var(--text-hi);
    font-weight: 700;
    font-size: 15px;
  }
  .cart-stats .row .val {
    font-family: "JetBrains Mono", monospace;
  }
  .cart-stats .row.total .val {
    font-size: 22px;
    color: var(--accent-2);
  }
  .cart-stats .row.total .val .cur {
    font-size: 11px;
    color: var(--text-low);
    margin-right: 3px;
    font-weight: 500;
  }

  .checkout {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(180deg, var(--accent-2), var(--accent));
    color: #1a0d00;
    font-family: "Noto Serif TC", serif;
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all .2s;
    box-shadow: var(--shadow-pop);
  }
  .checkout:hover {
    transform: translateY(-1px);
    box-shadow: 0 24px 60px -20px rgba(255,138,61,.6);
  }
  .checkout:disabled {
    opacity: .4;
    cursor: not-allowed;
    transform: none;
  }
  .checkout .arrow { font-size: 18px; letter-spacing: 0; }

  /* entrance animation */
  .item {
    opacity: 0;
    animation: rise .4s ease forwards;
  }
  @keyframes rise {
    to { opacity: 1; transform: translateY(0); }
    from { opacity: 0; transform: translateY(6px); }
  }

  /* toast for add-to-cart feedback */
  .flash {
    position: fixed;
    pointer-events: none;
    color: var(--accent-2);
    font-family: "JetBrains Mono", monospace;
    font-weight: 700;
    font-size: 14px;
    animation: flashUp .8s ease forwards;
    z-index: 100;
  }
  @keyframes flashUp {
    0%   { opacity: 0; transform: translate(-50%, 0); }
    15%  { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -40px); }
  }
</style>
</head>
<body>
<div class="app">

  <!-- ========== SIDEBAR ========== -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">鍋家</div>
      <div class="brand-sub">POS · v2</div>
    </div>

    <div class="side-label">分類導覽</div>
    <nav class="cat-nav" id="catNav">
      <div class="cat-item active" data-target="set">
        <span class="cat-icon">🍲</span><span>套餐</span><span class="cat-count">4</span>
      </div>
      <div class="cat-item" data-target="meat">
        <span class="cat-icon">🥩</span><span>肉品</span><span class="cat-count">4</span>
      </div>
      <div class="cat-item" data-target="veg">
        <span class="cat-icon">🥬</span><span>蔬菜</span><span class="cat-count">7</span>
      </div>
      <div class="cat-item" data-target="potA">
        <span class="cat-icon">🍢</span><span>火鍋料 A</span><span class="cat-count">11</span>
      </div>
      <div class="cat-item" data-target="potB">
        <span class="cat-icon">🍡</span><span>火鍋料 B</span><span class="cat-count">4</span>
      </div>
      <div class="cat-item" data-target="special">
        <span class="cat-icon">⭐</span><span>特色加點</span><span class="cat-count">3</span>
      </div>
      <div class="cat-item" data-target="main">
        <span class="cat-icon">🍜</span><span>主食</span><span class="cat-count">8</span>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="shift-card">
        <div class="shift-label">Current Shift</div>
        <div class="shift-name"><span class="shift-dot"></span>羅志宏 · 001</div>
      </div>
      <div class="shift-actions">
        <button class="shift-btn">交班</button>
        <button class="shift-btn">登出</button>
      </div>
    </div>
  </aside>

  <!-- ========== MAIN ========== -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <h1>現場點餐</h1>
        <div class="meta">STORE_1 · <span>鍋家本舖</span> · <span id="clock">--:--</span></div>
      </div>
      <div class="search">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="搜尋品項… (如：毛肚、麵)">
      </div>
    </div>

    <div class="tab-row">
      <div class="tab active">點餐</div>
      <div class="tab">今日訂單 <span class="tab-badge">24</span></div>
    </div>

    <div class="flavor-bar">
      <span class="flavor-label">鍋底 / 口味</span>
      <div class="flavor-chip active"><span class="num">01</span>未選口味</div>
      <div class="flavor-chip add">＋ 新增組別</div>
      <button class="apply-btn">套用至全品項 ↗</button>
    </div>

    <div class="menu-scroll" id="menuScroll">
      <!-- sections injected by JS -->
    </div>
  </main>

  <!-- ========== CART ========== -->
  <aside class="cart">
    <div class="cart-head">
      <h2>購物車</h2>
      <button class="cart-clear" id="clearBtn">清空</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-foot">
      <div class="cart-stats">
        <div class="row"><span>小計</span><span class="val" id="subtotal">NT$0</span></div>
        <div class="row"><span>品項數</span><span class="val" id="itemCount">0</span></div>
        <div class="row total">
          <span>合計</span>
          <span class="val"><span class="cur">NT$</span><span id="grandTotal">0</span></span>
        </div>
      </div>
      <button class="checkout" id="checkoutBtn" disabled>
        結 帳 <span class="arrow">→</span>
      </button>
    </div>
  </aside>

</div>

<script>
  // ---- data ----
  const MENU = [
    { id:"set", title:"套餐", en:"SET MEALS", combo:true, items:[
      { name:"經典組合", price:130, emoji:"🍲", popular:true },
      { name:"熱賣三倍肉", price:165, emoji:"🥩", popular:true },
      { name:"招牌毛肚雙倍肉", price:180, emoji:"🍖", popular:true },
      { name:"綜合鍋物", price:145, emoji:"🫕" },
    ]},
    { id:"meat", title:"肉品", en:"MEATS", items:[
      { name:"經典豬肉片", price:45, emoji:"🥓" },
      { name:"薄切雞肉片", price:55, emoji:"🐓" },
      { name:"梅花豬肉片", price:55, emoji:"🥩" },
      { name:"鮮切牛五花", price:65, emoji:"🥩", popular:true },
    ]},
    { id:"veg", title:"蔬菜", en:"VEGETABLES", items:[
      { name:"馬鈴薯", price:25, emoji:"🥔" },
      { name:"蓮藕", price:30, emoji:"🪷" },
      { name:"青花菜", price:25, emoji:"🥦" },
      { name:"娃娃菜", price:30, emoji:"🥬" },
      { name:"高麗菜捲", price:25, emoji:"🥬" },
      { name:"金針菇", price:25, emoji:"🍄" },
      { name:"秋葵", price:25, emoji:"🌿" },
    ]},
    { id:"potA", title:"火鍋料 A", en:"HOTPOT SET A", items:[
      { name:"鑫鑫腸", price:30, emoji:"🌭" },
      { name:"蟹肉棒", price:25, emoji:"🦀" },
      { name:"魚卵福袋", price:25, emoji:"🥟" },
      { name:"蝦餃", price:25, emoji:"🥟" },
      { name:"蛋餃", price:25, emoji:"🥟" },
      { name:"魚豆腐", price:25, emoji:"🐟" },
      { name:"米血", price:10, emoji:"🟫" },
      { name:"甜不辣小黑輪", price:20, emoji:"🍢" },
      { name:"大黑輪", price:20, emoji:"🍢" },
      { name:"豆皮", price:25, emoji:"🟨" },
      { name:"凍豆腐", price:25, emoji:"⬜" },
    ]},
    { id:"potB", title:"火鍋料 B", en:"HOTPOT SET B", items:[
      { name:"牛肉丸", price:15, emoji:"🔴" },
      { name:"起司牛肉丸", price:15, emoji:"🧀" },
      { name:"貢丸", price:25, emoji:"⚪" },
      { name:"高麗菜捲", price:45, emoji:"🥬" },
    ]},
    { id:"special", title:"特色加點", en:"SIGNATURE ADD-ONS", items:[
      { name:"鴨腸", price:40, emoji:"🦆", popular:true },
      { name:"毛肚", price:40, emoji:"🍖", popular:true },
      { name:"白蝦", price:50, emoji:"🦐", popular:true },
    ]},
    { id:"main", title:"主食", en:"STAPLES", items:[
      { name:"泡麵", price:15, emoji:"🍜" },
      { name:"白飯", price:15, emoji:"🍚" },
      { name:"寬粉", price:15, emoji:"🍝" },
      { name:"烏龍麵", price:30, emoji:"🍜" },
      { name:"韓式Q拉麵", price:35, emoji:"🍜" },
      { name:"高麗菜水餃", price:6, emoji:"🥟" },
      { name:"滷肉飯", price:35, emoji:"🍚", popular:true },
      { name:"滷肉飯 (大)", price:45, emoji:"🍚" },
    ]},
  ];

  // ---- render menu ----
  const scroll = document.getElementById("menuScroll");
  let ix = 0;
  MENU.forEach((cat) => {
    const sec = document.createElement("section");
    sec.className = "cat-section";
    sec.id = "cat-" + cat.id;
    sec.innerHTML = `
      <div class="cat-header">
        <h2>${cat.title}</h2>
        <span class="cat-en">${cat.en}</span>
        <span class="cat-rule"></span>
        <span class="cat-cnt">${cat.items.length} items</span>
      </div>
      <div class="grid"></div>
    `;
    const grid = sec.querySelector(".grid");
    cat.items.forEach((it) => {
      const card = document.createElement("button");
      card.className = "item" + (cat.combo ? " combo" : "") + (it.popular ? " popular" : "");
      card.style.animationDelay = (ix++ * 15) + "ms";
      card.dataset.name = it.name;
      card.dataset.price = it.price;
      card.dataset.emoji = it.emoji;
      card.innerHTML = `
        <span class="item-emoji">${it.emoji}</span>
        <div class="item-name">${it.name}</div>
        <div class="item-bottom">
          <span class="item-price"><span class="cur">NT$</span>${it.price}</span>
          <span class="item-add">+</span>
        </div>
      `;
      card.addEventListener("click", (e) => addToCart(it, e));
      grid.appendChild(card);
    });
    scroll.appendChild(sec);
  });

  // ---- sidebar category click ----
  document.querySelectorAll(".cat-item").forEach((el) => {
    el.addEventListener("click", () => {
      document.querySelectorAll(".cat-item").forEach(x => x.classList.remove("active"));
      el.classList.add("active");
      const target = document.getElementById("cat-" + el.dataset.target);
      target && target.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  });

  // track active section on scroll
  scroll.addEventListener("scroll", () => {
    const scrollTop = scroll.scrollTop;
    const sections = document.querySelectorAll(".cat-section");
    let current = sections[0];
    sections.forEach(s => {
      if (s.offsetTop - 40 <= scrollTop) current = s;
    });
    const id = current.id.replace("cat-", "");
    document.querySelectorAll(".cat-item").forEach(x => {
      x.classList.toggle("active", x.dataset.target === id);
    });
  });

  // ---- cart state ----
  const cart = new Map();

  function addToCart(item, e) {
    const cur = cart.get(item.name) || { ...item, qty: 0 };
    cur.qty += 1;
    cart.set(item.name, cur);
    renderCart();
    if (e) showFlash(e.clientX, e.clientY);
  }
  function changeQty(name, delta) {
    const c = cart.get(name);
    if (!c) return;
    c.qty += delta;
    if (c.qty <= 0) cart.delete(name);
    else cart.set(name, c);
    renderCart();
  }

  function showFlash(x, y) {
    const el = document.createElement("div");
    el.className = "flash";
    el.textContent = "+1";
    el.style.left = x + "px";
    el.style.top  = y + "px";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 800);
  }

  function renderCart() {
    const container = document.getElementById("cartItems");
    const subtotalEl = document.getElementById("subtotal");
    const countEl = document.getElementById("itemCount");
    const totalEl = document.getElementById("grandTotal");
    const checkoutBtn = document.getElementById("checkoutBtn");

    if (cart.size === 0) {
      container.innerHTML = `
        <div class="cart-empty">
          <div class="cart-empty-ico">🍲</div>
          <div class="cart-empty-txt">尚未選取品項</div>
          <div class="cart-empty-hint">點選左側品項加入購物車</div>
        </div>`;
      subtotalEl.textContent = "NT$0";
      countEl.textContent = "0";
      totalEl.textContent = "0";
      checkoutBtn.disabled = true;
      return;
    }

    let total = 0, count = 0;
    const rows = [];
    cart.forEach((it) => {
      const line = it.price * it.qty;
      total += line; count += it.qty;
      rows.push(`
        <div class="cart-line">
          <div class="cart-name"><span class="emj">${it.emoji}</span>${it.name}</div>
          <div class="cart-qty">
            <button class="qty-btn" onclick="changeQty('${it.name.replace(/'/g,"\\'")}',-1)">−</button>
            <span class="qty-val">${it.qty}</span>
            <button class="qty-btn" onclick="changeQty('${it.name.replace(/'/g,"\\'")}',1)">+</button>
          </div>
          <div class="cart-sub">NT$${it.price} × ${it.qty}</div>
          <div class="cart-price">NT$${line}</div>
        </div>
      `);
    });
    container.innerHTML = rows.join("");
    subtotalEl.textContent = "NT$" + total;
    countEl.textContent = count;
    totalEl.textContent = total;
    checkoutBtn.disabled = false;
  }

  document.getElementById("clearBtn").addEventListener("click", () => {
    cart.clear(); renderCart();
  });

  // ---- search filter ----
  document.getElementById("searchInput").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    document.querySelectorAll(".item").forEach((card) => {
      const match = !q || card.dataset.name.toLowerCase().includes(q);
      card.style.display = match ? "" : "none";
    });
    // hide empty sections
    document.querySelectorAll(".cat-section").forEach((sec) => {
      const visible = sec.querySelectorAll('.item:not([style*="display: none"])').length;
      sec.style.display = visible ? "" : "none";
    });
  });

  // ---- clock ----
  function tick() {
    const d = new Date();
    document.getElementById("clock").textContent =
      d.toLocaleTimeString("zh-TW", { hour: "2-digit", minute: "2-digit", hour12: false });
  }
  tick(); setInterval(tick, 10000);

  renderCart();
</script>
</body>
</html>
