<!DOCTYPE html>
<!-- UTF-8 required: 禁止使用未指定編碼工具覆蓋本檔 -->
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>樂樂山 KDS 廚房出單</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ops.css?v=20260419-p2a-v4">
</head>
<body class="ops-page kds-has-stats-bar">
  <div id="auth-loading" class="ops-login-guard">正在驗證員工登入...</div>
  <div class="ops-shell">
    <header class="ops-topbar">
      <div class="kds-bar__brand">
        <div class="kds-bar__logo">樂</div>
        廚房 KDS
      </div>
      <div class="kds-bar__live">
        <span class="kds-bar__dot"></span>
        <span>LIVE</span>
      </div>
      <div class="kds-bar__info">
        <span id="ops-store-meta"></span>
        <span id="ops-user-meta"></span>
      </div>
      <span id="kds-last-update" class="kds-bar__update">即時更新中</span>
    </header>

    <section class="ops-panel" style="display:none">
      <div class="ops-stats">
        <div class="ops-stat"><span>待處理</span><strong id="stat-pending">0</strong></div>
        <div class="ops-stat"><span>製作中</span><strong id="stat-preparing">0</strong></div>
        <div class="ops-stat"><span>可取餐</span><strong id="stat-ready">0</strong></div>
        <div class="ops-stat"><span>顯示中</span><strong id="stat-visible">0</strong></div>
      </div>
    </section>

    <div id="auth-error" class="ops-error hidden"></div>

    <main id="kds-list" class="kds-main">
      <div class="kds-alert-strip" id="kds-alert-strip" hidden>
        <div class="kds-alert-strip__content">
          <span>⚠ 待確認</span>
          <span class="kds-alert-strip__count" id="kds-alert-count">0 筆</span>
          <div class="kds-alert-strip__marquee">
            <span id="kds-alert-marquee"></span>
          </div>
          <span class="kds-alert-strip__oldest" id="kds-alert-oldest">最老 0 分</span>
        </div>
      </div>

      <div class="kds-board" id="kds-board">
        <section class="kds-col kds-col--pending" id="kds-col-pending">
          <div class="kds-col__head">
            <span class="kds-col__title">⚠ 待確認</span>
            <span class="kds-col__count" id="kds-ct-pending">0</span>
          </div>
          <div class="kds-col__body" id="kds-body-pending"></div>
        </section>
        <section class="kds-col kds-col--work" id="kds-col-work">
          <div class="kds-col__head">
            <span class="kds-col__title">製作中</span>
            <span class="kds-col__count" id="kds-ct-work">0</span>
          </div>
          <div class="kds-col__body" id="kds-body-work"></div>
        </section>
        <section class="kds-col kds-col--ready" id="kds-col-ready">
          <div class="kds-col__head">
            <span class="kds-col__title">可取餐</span>
            <span class="kds-col__count" id="kds-ct-ready">0</span>
          </div>
          <div class="kds-col__body" id="kds-body-ready"></div>
        </section>
      </div>
    </main>

    <div class="kds-stats-bar">
      <div class="kds-stats-bar__item">
        <span class="kds-stats-bar__label">今日進度</span>
        <div class="kds-stats-bar__gauge" id="kds-gauge">
          <span class="sg-p" style="width:0%"></span>
          <span class="sg-w" style="width:0%"></span>
          <span class="sg-r" style="width:0%"></span>
        </div>
      </div>
      <div class="kds-stats-bar__item">
        <span class="kds-stats-bar__label">待確認</span>
        <span class="kds-stats-bar__val" id="kds-sb-p">0</span>
      </div>
      <div class="kds-stats-bar__item">
        <span class="kds-stats-bar__label">製作中</span>
        <span class="kds-stats-bar__val" id="kds-sb-w">0</span>
      </div>
      <div class="kds-stats-bar__item">
        <span class="kds-stats-bar__label">可取餐</span>
        <span class="kds-stats-bar__val" id="kds-sb-r">0</span>
      </div>
      <div class="kds-stats-bar__item" style="margin-left:auto">
        <span class="kds-stats-bar__label">最老待確認</span>
        <span class="kds-stats-bar__val" id="kds-sb-oldest">—</span>
      </div>
    </div>
  </div>

  <!-- KDS 訂單預覽 Modal -->
  <div id="kds-preview-modal" class="kds-modal" hidden role="dialog" aria-modal="true" aria-labelledby="kds-preview-num">
    <div class="kds-modal__backdrop" id="kds-preview-backdrop"></div>
    <div class="kds-modal__box">
      <div class="kds-modal__header" id="kds-preview-header">
        <span class="kds-modal__num" id="kds-preview-num"></span>
        <span class="kds-modal__status-badge" id="kds-preview-status"></span>
        <button class="kds-modal__close" id="kds-preview-close" type="button" aria-label="關閉預覽">✕</button>
      </div>
      <div class="kds-modal__body" id="kds-preview-body"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="/config.public.js?v=20260413-1"></script>
  <script src="/order-helpers.js?v=20260419-p2a-v4"></script>
  <script src="/staff-auth.js?v=20260404-1"></script>
  <script src="/order-status-labels.js?v=20260418-2"></script>
  <script src="/kds.js?v=20260419-p2a-v4"></script>
</body>
</html>
