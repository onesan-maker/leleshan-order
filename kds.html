<!DOCTYPE html>
<!-- UTF-8 required: 禁止使用未指定編碼工具覆蓋本檔 -->
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>樂樂山 KDS 廚房出單</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@600;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/tokens.css?v=20260422-w1">
  <link rel="stylesheet" href="/shared/components.css?v=20260422-w1">
  <link rel="stylesheet" href="/ops.css?v=20260421-lock-timing-v2">
  <link rel="stylesheet" href="/kds-refresh.css?v=20260426-w10c">
  <style>
    /* 兩欄 KDS board */
    .kds-board--two-col { grid-template-columns: 1fr 1fr !important; }

    /* 取消訂單 Modal */
    .kds-cancel-modal__box { max-width: 380px; }
    .kds-cancel-modal__body { padding: 8px 0 0; }
    .kds-cancel-modal__subtitle { margin: 0 0 14px; font-size: .85rem; color: var(--kds-muted, #888); text-align: center; }
    .kds-cancel-modal__reasons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 4px 16px; }
    .kds-cancel-reason-btn {
      padding: 14px 10px; border-radius: 0; border: none;
      background: transparent; color: #f87171; font-size: .95rem; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .kds-cancel-reason-btn:hover, .kds-cancel-reason-btn:focus { background: rgba(239, 68, 68, 0.18); outline: none; }
    .kds-cancel-modal__footer { padding: 0 4px 4px; }
    .kds-cancel-modal__dismiss {
      width: 100%; padding: 12px; border-radius: 0; border: 1px solid #d1d5db;
      background: #f9fafb; color: #374151; font-size: .9rem; cursor: pointer;
    }
    .kds-cancel-modal__dismiss:hover { background: #f3f4f6; }

    /* 取消按鈕樣式 */
    .kds-btn--cancel {
      padding: 6px 10px; border-radius: 0; border: none;
      background: transparent; color: #dc2626; font-size: .78rem; font-weight: 600;
      cursor: pointer; min-width: 44px;
    }
    .kds-btn--cancel:hover { background: rgba(239, 68, 68, 0.18); }

    /* 站別徽章 */
    .kds-station-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 999px; font-weight: 700; font-size: .85rem;
      background: #eef2ff; color: #3730a3;
    }
    body.kds-mode-boil .kds-station-badge { background: #fff1e6; color: #b45309; }
    body.kds-mode-pack .kds-station-badge { background: #e0f2fe; color: #075985; }

    /* 站別配色：淺色 tint，不影響既有訊息區 */
    body.kds-mode-boil .ops-topbar { box-shadow: inset 0 -3px 0 #f59e0b; }
    body.kds-mode-pack .ops-topbar { box-shadow: inset 0 -3px 0 #0ea5e9; }

    /* 鎖定條 */
    .kds-lock-bar {
      padding: 10px 14px; background: #fef3c7; color: #78350f;
      border-bottom: 1px solid #fde68a; font-size: .95rem; text-align: center; font-weight: 600;
    }
    /* 預設未知前先鎖定，拿到 session 後才解除 */
    body.kds-locked .kds-btn,
    body.kds-locked [data-next-status],
    body.kds-locked [data-cancel-order] {
      pointer-events: none !important;
      opacity: .45 !important;
      filter: grayscale(60%) !important;
      cursor: not-allowed !important;
    }

    /* 站別過濾顯示欄位：強制覆蓋任何 kds-is-collapsed / max-width 設定 */
    body.kds-mode-boil #kds-col-ready,
    body.kds-mode-pack #kds-col-work {
      display: none !important;
      width: 0 !important;
      max-width: 0 !important;
      min-width: 0 !important;
      border: 0 !important;
      padding: 0 !important;
      margin: 0 !important;
      overflow: hidden !important;
      visibility: hidden !important;
    }
    body.kds-mode-boil .kds-board--two-col,
    body.kds-mode-pack .kds-board--two-col {
      grid-template-columns: 1fr !important;
    }

    .kds-duty-text { font-weight: 600; }
    .kds-duty-text.kds-duty--empty { color: #b91c1c; }

    /* Hub 狀態圓點：已由 kds-refresh.css .kds-hub-pill 取代，此段保留但不生效 */
  </style>
</head>
<body class="ops-page kds-has-stats-bar kds-locked">
  <div id="auth-loading" class="ops-login-guard">正在驗證員工登入...</div>
  <div class="ops-shell">
    <header class="ops-topbar">
      <div class="kds-bar__brand">
        <div class="kds-bar__logo">樂</div>
        廚房 KDS
      </div>
      <div class="kds-bar__live">
        <span class="kds-bar__dot"></span>
        <span>LIVE</span>
      </div>
      <div class="kds-station-badge" id="kds-station-badge">烹煮站</div>
      <div class="kds-bar__info">
        <span id="kds-duty" class="kds-duty-text kds-duty--empty">目前值班：未登入</span>
        <span id="ops-store-meta"></span>
        <span id="ops-user-meta" style="display:none"></span>
      </div>
      <span id="kds-last-update" class="kds-bar__update">即時更新中</span>
      <button id="kds-sound-toggle" style="margin-left:10px;background:none;border:none;cursor:pointer;font-size:1.2em;line-height:1;padding:2px 6px;color:inherit;">🔊</button>
      <span id="hub-status-indicator" class="kds-hub-pill" title="本機 Hub 連線中"><span id="hub-status-text">本機 Hub 連線中</span></span>
    </header>

    <section class="ops-panel" style="display:none">
      <div class="ops-stats">
        <div class="ops-stat"><span>待處理</span><strong id="stat-pending">0</strong></div>
        <div class="ops-stat"><span>製作中</span><strong id="stat-preparing">0</strong></div>
        <div class="ops-stat"><span>可取餐</span><strong id="stat-ready">0</strong></div>
        <div class="ops-stat"><span>顯示中</span><strong id="stat-visible">0</strong></div>
      </div>
    </section>

    <div id="auth-error" class="ops-error hidden"></div>
    <div id="kds-lock-bar" class="kds-lock-bar">尚未設定值班員工，請先至 POS 登入或交班</div>

    <main id="kds-list" class="kds-main">
      <div class="kds-board kds-board--two-col" id="kds-board">
        <section class="kds-col kds-col--work" id="kds-col-work">
          <div class="kds-col__head">
            <span class="kds-col__title">製作中</span>
            <span class="kds-col__count" id="kds-ct-work">0</span>
          </div>
          <div class="kds-col__body" id="kds-body-work"></div>
        </section>
        <section class="kds-col kds-col--ready" id="kds-col-ready">
          <div class="kds-col__head">
            <span class="kds-col__title">可取餐</span>
            <span class="kds-col__count" id="kds-ct-ready">0</span>
          </div>
          <div class="kds-col__body" id="kds-body-ready"></div>
        </section>
      </div>
    </main>

    <div class="kds-stats-bar">
      <div class="kds-stats-bar__item">
        <span class="kds-stats-bar__label">今日進度</span>
        <div class="kds-stats-bar__gauge" id="kds-gauge">
          <span class="sg-p" style="width:0%"></span>
          <span class="sg-w" style="width:0%"></span>
          <span class="sg-r" style="width:0%"></span>
        </div>
      </div>
      <div class="kds-stats-bar__item">
        <span class="kds-stats-bar__label">製作中</span>
        <span class="kds-stats-bar__val" id="kds-sb-w">0</span>
      </div>
      <div class="kds-stats-bar__item">
        <span class="kds-stats-bar__label">可取餐</span>
        <span class="kds-stats-bar__val" id="kds-sb-r">0</span>
      </div>
    </div>
  </div>

  <!-- KDS 取消訂單 Modal -->
  <div id="kds-cancel-modal" class="kds-modal" hidden role="dialog" aria-modal="true" aria-labelledby="kds-cancel-title">
    <div class="kds-modal__backdrop" id="kds-cancel-backdrop"></div>
    <div class="kds-modal__box kds-cancel-modal__box">
      <div class="kds-modal__header">
        <span class="kds-modal__num" id="kds-cancel-title">取消訂單</span>
      </div>
      <div class="kds-cancel-modal__body">
        <p class="kds-cancel-modal__subtitle">請選擇取消原因（必選）</p>
        <div class="kds-cancel-modal__reasons">
          <button class="kds-cancel-reason-btn" type="button" data-reason="busy">爆單 / 忙碌中</button>
          <button class="kds-cancel-reason-btn" type="button" data-reason="out_of_stock">食材售完</button>
          <button class="kds-cancel-reason-btn" type="button" data-reason="closing">即將打烊</button>
          <button class="kds-cancel-reason-btn" type="button" data-reason="abnormal_order">訂單異常</button>
        </div>
      </div>
      <div class="kds-cancel-modal__footer">
        <button class="kds-cancel-modal__dismiss" type="button" id="kds-cancel-dismiss">不取消，返回</button>
      </div>
    </div>
  </div>

  <!-- KDS 訂單預覽 Modal -->
  <div id="kds-preview-modal" class="kds-modal" hidden role="dialog" aria-modal="true" aria-labelledby="kds-preview-num">
    <div class="kds-modal__backdrop" id="kds-preview-backdrop"></div>
    <div class="kds-modal__box">
      <div class="kds-modal__header" id="kds-preview-header">
        <span class="kds-modal__num" id="kds-preview-num"></span>
        <span class="kds-modal__status-badge" id="kds-preview-status"></span>
        <button class="kds-modal__close" id="kds-preview-close" type="button" aria-label="關閉預覽">✕</button>
      </div>
      <div class="kds-modal__body" id="kds-preview-body"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="/config.public.js?v=20260413-1"></script>
  <script src="/kds-hub-client.js?v=20260426-w11b"></script>
  <script src="/order-helpers.js?v=20260421-parallel-cap-v27"></script>
  <script src="/staff-auth.js?v=20260404-1"></script>
  <script src="/order-status-labels.js?v=20260418-2"></script>
  <script src="/kds-sound.js?v=20260420-p2b"></script>
  <script src="/ops-session-sync.js?v=20260421-strip-fix"></script>
  <script src="/order-action-logger.js?v=20260421-strip-fix"></script>
  <script src="/kds.js?v=20260421-parallel-cap-v27"></script>
</body>
</html>
