<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>樂樂山 POS v2</title>
  <link rel="icon" href="/favicon.ico" />
  <script src="/config.public.js"></script>
  <!-- Firebase compat shim: order-helpers.js 是 vanilla compat SDK 寫的，
       在 POS v2 (modular SDK) 環境需先 shim FieldValue.serverTimestamp。
       實際 serverTimestamp function 由 src/lib/firebase.ts 在 React mount 前注入 __posv2_sts。 -->
  <script>
    window.firebase = window.firebase || {};
    window.firebase.firestore = window.firebase.firestore || {};
    window.firebase.firestore.FieldValue = {
      serverTimestamp: function () {
        if (typeof window.__posv2_sts !== "function") {
          throw new Error("[POS v2] serverTimestamp shim not ready; firebase.ts must load before helpers are invoked");
        }
        return window.__posv2_sts();
      }
    };
  </script>
  <script src="/order-helpers.js"></script>
  <script src="/order-status-labels.js"></script>
  <script type="module" crossorigin src="/pos/assets/index-CKD0dL4X.js"></script>
  <link rel="stylesheet" crossorigin href="/pos/assets/index-CD1vswDD.css">
</head>
<body>
  <div id="root"></div>
</body>
</html>
