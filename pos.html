<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>樂樂山 POS 現場點餐</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ops.css?v=20260410-4">
  <style>
    .pos-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 4px;
    }
    .pos-tab-btn {
      min-height: 44px;
      padding: 10px 22px;
      border-radius: 14px;
      font-weight: 800;
      font-size: .95rem;
      color: var(--ops-text);
      background: rgba(255, 255, 255, .06);
      border: 1px solid rgba(255, 255, 255, .08);
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .pos-tab-btn.is-active {
      background: rgba(249, 115, 22, .18);
      border-color: rgba(249, 115, 22, .38);
      color: #fff5ed;
    }
    .pos-tab-content { display: none; }
    .pos-tab-content.is-active { display: block; }

    .pos-append-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 18px;
      border-radius: 16px;
      background: rgba(245, 158, 11, .16);
      border: 1px solid rgba(245, 158, 11, .36);
      color: #fde68a;
      font-weight: 700;
      font-size: .92rem;
    }
    .pos-append-banner__cancel {
      padding: 6px 16px;
      border-radius: 10px;
      background: rgba(239, 68, 68, .18);
      border: 1px solid rgba(239, 68, 68, .3);
      color: #fecaca;
      font-weight: 800;
      font-size: .85rem;
      cursor: pointer;
      white-space: nowrap;
    }

    .pos-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 16px;
      align-items: start;
    }
    .pos-part-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin: 8px 0 12px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .08);
    }
    .pos-part-list {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pos-part-chip {
      border: 1px solid rgba(255, 255, 255, .14);
      background: rgba(255, 255, 255, .03);
      color: var(--ops-text, #f5f7fa);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: .82rem;
      cursor: pointer;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background .14s, border-color .14s;
      white-space: nowrap;

      background: rgba(255, 255, 255, .07);
      border-color: rgba(255, 255, 255, .26);

    .pos-part-chip.is-active {
      border-color: rgba(249, 115, 22, .72);
      background: rgba(249, 115, 22, .17);
      color: #fff7ed;
      box-shadow: 0 0 0 2px rgba(249, 115, 22, .2);
    }
    .pos-part-chip--add {
      border-style: dashed;
      border-color: rgba(249, 115, 22, .45);
      color: rgba(249, 115, 22, .9);
      background: rgba(249, 115, 22, .05);
      font-size: .8rem;
    }
    .pos-part-chip--add:hover {
      background: rgba(249, 115, 22, .12);
      border-color: rgba(249, 115, 22, .7);
    }
    .pos-part-actions {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .pos-part-btn {
      border: 1px solid rgba(255, 255, 255, .18);
      background: rgba(255, 255, 255, .06);
      color: var(--ops-text, #f5f7fa);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: .8rem;
      font-weight: 800;
      cursor: pointer;
      transition: background .14s;

    .pos-part-btn--accent {
      border-color: rgba(249, 115, 22, .5);
      background: rgba(249, 115, 22, .18);
      color: #ffedd5;
    }
    .pos-part-btn--sm {
      font-size: .74rem;
      padding: 5px 9px;
      border-radius: 8px;
      font-weight: 700;
      opacity: .75;

    .pos-part-hint {
      width: 100%;
      font-size: .78rem;
      color: #fdba74;
      display: none;
    }
    .pos-part-hint.is-visible { display: block; }
    .pos-assign-inline {
      display: none;
      width: 100%;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,.06);
      flex-wrap: wrap;
    }
    .pos-assign-inline.is-visible { display: flex; }
    .pos-assign-inline__label {
      font-size: .76rem;
      color: #9aa8b8;
      white-space: nowrap;
    }
    .pos-assign-target-chips {
      display: inline-flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .pos-assign-chip {
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.04);
      color: var(--ops-text, #f5f7fa);
      border-radius: 999px;
      padding: 5px 11px;
      font-size: .78rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .12s, border-color .12s;
      white-space: nowrap;
    }
    .pos-assign-chip:hover {
      background: rgba(255,255,255,.09);
    }
    .pos-assign-chip.is-selected {
      border-color: rgba(249, 115, 22, .65);
      background: rgba(249, 115, 22, .16);
      color: #ffedd5;
    }
    .pos-assign-chip--new {
      border-style: dashed;
      border-color: rgba(74, 222, 128, .4);
      color: rgba(74, 222, 128, .9);
      background: rgba(74, 222, 128, .05);
    }
    .pos-assign-chip--new:hover {
      background: rgba(74, 222, 128, .1);
    }

    .pos-menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }
    .pos-menu-tile {
      background: var(--ops-surface-strong, #1f2935);
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 18px 12px;
      cursor: pointer;
      text-align: center;
      transition: border-color .15s, background .15s;
      min-height: 72px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .pos-menu-tile:hover {
      border-color: var(--ops-accent, #f97316);
      background: rgba(249, 115, 22, .08);
    }
    .pos-menu-tile--soldout {
      opacity: .5;
      cursor: not-allowed;
      pointer-events: none;
      filter: grayscale(.2);
      border-color: rgba(239, 68, 68, .24);
      background: rgba(127, 29, 29, .14);
    }
    .pos-menu-tile--soldout:hover {
      border-color: rgba(239, 68, 68, .24);
      background: rgba(127, 29, 29, .14);
    }
    .pos-menu-tile__name {
      font-weight: 700;
      font-size: .95rem;
      color: var(--ops-text, #f5f7fa);
      line-height: 1.3;
    }
    .pos-menu-tile__price {
      color: var(--ops-accent, #f97316);
      font-size: .85rem;
      font-weight: 700;
      margin-top: 4px;
    }
    .pos-menu-tile__soldout-label {
      display: inline-block;
      margin-top: 4px;
      font-size: .72rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 6px;
      background: rgba(239, 68, 68, .2);
      color: #fca5a5;
    }

    .pos-cart {
      background: var(--ops-surface, #18202b);
      border: 1px solid var(--ops-border, rgba(255, 255, 255, .08));
      border-radius: 16px;
      padding: 16px;
      position: sticky;
      top: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .pos-cart__title {
      font-weight: 900;
      font-size: 1.05rem;
      color: var(--ops-text, #f5f7fa);
    }
    .pos-cart__items {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 60px;
    }
    .pos-cart-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .88rem;
      color: var(--ops-text, #f5f7fa);
    }
    .pos-cart-item__name { flex: 1; }
    .pos-cart-item__meta {
      margin-top: 2px;
      font-size: .76rem;
      color: var(--ops-muted, #9aa8b8);
      line-height: 1.35;
    }
    .pos-cart-item__qty-btn {
      background: rgba(255, 255, 255, .1);
      border: 1px solid rgba(255, 255, 255, .14);
      border-radius: 6px;
      width: 26px;
      height: 26px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 700;
      color: var(--ops-text, #f5f7fa);
    }
    .pos-cart-item__qty {
      font-weight: 700;
      min-width: 20px;
      text-align: center;
      color: var(--ops-text, #f5f7fa);
    }
    .pos-cart-item__price {
      color: var(--ops-muted, #9aa8b8);
      white-space: nowrap;
      font-size: .85rem;
    }
    .pos-cart__total {
      font-size: 1.1rem;
      font-weight: 900;
      text-align: right;
      border-top: 1px solid var(--ops-border, rgba(255, 255, 255, .08));
      padding-top: 10px;
      color: var(--ops-text, #f5f7fa);
    }
    .pos-checkout {
      border: 1px solid rgba(249, 115, 22, .28);
      border-radius: 12px;
      padding: 12px;
      background: rgba(249, 115, 22, .06);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .pos-checkout__title {
      font-size: .78rem;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #fdba74;
    }
    .pos-checkout__total {
      font-size: 2rem;
      line-height: 1;
      font-weight: 900;
      color: #fff7ed;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .pos-payment-methods {
      display: grid;

      gap: 10px;
    }
    .pos-source-methods {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .pos-source-label {
      font-size: 0.78rem;
      opacity: 0.6;
      margin-bottom: 6px;
      padding-left: 2px;
    }
    .pos-payment-btn {
      min-height: 56px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, .2);
      background: rgba(255, 255, 255, .04);
      color: var(--ops-text, #f5f7fa);
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      transition: border-color .15s, background .15s, transform .08s;
    }
    .pos-payment-btn:hover {
      border-color: rgba(249, 115, 22, .55);
      background: rgba(249, 115, 22, .12);
    }
    .pos-payment-btn:active { transform: translateY(1px); }
    .pos-payment-btn.is-selected {
      border-color: rgba(249, 115, 22, .75);
      background: rgba(249, 115, 22, .22);
      color: #fff7ed;
      box-shadow: inset 0 0 0 1px rgba(249, 115, 22, .4);
    }
    .pos-cart__fields {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .pos-cart__fields label {
      font-size: .82rem;
      font-weight: 700;
      color: var(--ops-muted, #9aa8b8);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .pos-cart__fields input,
    .pos-cart__fields select {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid rgba(255, 255, 255, .12);

      font-size: .9rem;
      box-sizing: border-box;
      background: rgba(7, 12, 18, .8);
      color: var(--ops-text, #f5f7fa);
    }
    .pos-submit-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(180deg, #fdba74 0%, #f97316 100%);
      color: #1a0f00;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
    }
    .pos-submit-btn:disabled { opacity: .5; cursor: not-allowed; }
    .pos-submit-btn--append {
      background: linear-gradient(180deg, #fde68a 0%, #f59e0b 100%);
      color: #1a0f00;
    }
    .pos-status {
      font-size: .85rem;
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, .06);
      color: var(--ops-text, #f5f7fa);
      text-align: center;
    }
    .pos-status.ok { background: rgba(34, 197, 94, .16); color: #bbf7d0; }
    .pos-status.err { background: rgba(239, 68, 68, .16); color: #fecaca; }
    .pos-section-title {
      font-weight: 700;
      font-size: .8rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--ops-muted, #9aa8b8);
      margin: 14px 0 6px;
    }
    .pos-empty {
      color: var(--ops-muted, #9aa8b8);
      font-size: .85rem;
      text-align: center;
      padding: 10px 0;
    }

    .pos-orders-toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .pos-orders-search {
      flex: 1;
      min-width: 200px;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, .12);
      background: rgba(7, 12, 18, .8);
      color: var(--ops-text, #f5f7fa);
      font-size: .9rem;
    }
    .pos-orders-search::placeholder { color: var(--ops-muted, #9aa8b8); }
    .pos-orders-refresh {
      padding: 10px 18px;
      border-radius: 12px;
      background: rgba(255, 255, 255, .06);
      border: 1px solid rgba(255, 255, 255, .1);
      color: var(--ops-text, #f5f7fa);
      font-weight: 700;
      font-size: .88rem;
      cursor: pointer;
    }
    .pos-orders-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .88rem;
    }
    .pos-orders-table th {
      text-align: left;
      padding: 10px 12px;
      color: var(--ops-muted, #9aa8b8);
      font-weight: 700;
      font-size: .78rem;
      letter-spacing: .04em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--ops-border, rgba(255, 255, 255, .08));
    }
    .pos-orders-table td {
      padding: 11px 12px;
      color: var(--ops-text, #f5f7fa);
      border-bottom: 1px solid var(--ops-border, rgba(255, 255, 255, .06));
      vertical-align: middle;
    }
    .pos-orders-table tr:hover td { background: rgba(255, 255, 255, .03); }
    .pos-orders-actions {
      display: flex;
      gap: 6px;
      flex-wrap: nowrap;
    }
    .pos-orders-btn {
      padding: 5px 12px;
      border-radius: 8px;
      font-size: .8rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      border: 1px solid transparent;
    }
    .pos-orders-btn--view {
      background: rgba(56, 189, 248, .14);
      border-color: rgba(56, 189, 248, .28);
      color: #bae6fd;
    }
    .pos-orders-btn--append {
      background: rgba(245, 158, 11, .14);
      border-color: rgba(245, 158, 11, .28);
      color: #fde68a;
    }
    .pos-source-badge {
      display: inline-block;
      font-size: .72rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      color: #fff;
    }
    .pos-source-badge--liff { background: #06c755; }
    .pos-source-badge--pos { background: #2c7be5; }
    .pos-source-badge--manual { background: #888; }
    .pos-source-badge--ubereats { background: #1e9b48; }
    .pos-source-badge--foodpanda { background: #d40b57; }

    .pos-detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .65);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }
    .pos-detail-card {
      background: var(--ops-surface, #18202b);
      border: 1px solid var(--ops-border);
      border-radius: 24px;
      padding: 24px;
      width: 100%;
      max-width: 600px;
      max-height: 85vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .pos-detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .pos-detail-header h3 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 900;
      color: var(--ops-text, #f5f7fa);
    }
    .pos-detail-close {
      background: rgba(255, 255, 255, .08);
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 10px;
      width: 36px;
      height: 36px;
      font-size: 1.1rem;
      color: var(--ops-text, #f5f7fa);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pos-detail-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 16px;
      font-size: .88rem;
    }
    .pos-detail-meta-row { display: flex; flex-direction: column; gap: 2px; }
    .pos-detail-meta-label { color: var(--ops-muted, #9aa8b8); font-size: .78rem; font-weight: 700; }
    .pos-detail-meta-val { color: var(--ops-text, #f5f7fa); font-weight: 600; }
    .pos-detail-items-title {
      font-size: .82rem;
      font-weight: 700;
      color: var(--ops-muted, #9aa8b8);
      letter-spacing: .04em;
      text-transform: uppercase;
      border-top: 1px solid var(--ops-border);
      padding-top: 12px;
    }
    .pos-detail-item {
      display: flex;
      align-items: baseline;
      gap: 8px;
      font-size: .9rem;
      color: var(--ops-text, #f5f7fa);
      padding: 6px 0;
      border-bottom: 1px solid rgba(255, 255, 255, .04);
    }
    .pos-detail-item__qty {
      font-weight: 900;
      color: var(--ops-accent, #f97316);
      min-width: 28px;
    }
    .pos-detail-item__name { flex: 1; }
    .pos-detail-item__price { color: var(--ops-muted, #9aa8b8); font-size: .85rem; white-space: nowrap; }
    .pos-detail-total {
      font-size: 1rem;
      font-weight: 900;
      text-align: right;
      color: var(--ops-text, #f5f7fa);
      border-top: 1px solid var(--ops-border);
      padding-top: 10px;
    }
    .pos-detail-note {
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .06);
      font-size: .88rem;
      color: var(--ops-muted, #9aa8b8);
    }
    .pos-detail-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .pos-spec-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .64);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1100;
      padding: 16px;
    }
    .pos-spec-card {

      max-width: 460px;

      border-radius: 18px;
      padding: 18px 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      box-shadow: 0 24px 48px rgba(0, 0, 0, .42);
    }
    .pos-spec-title {
      margin: 0;
      color: var(--ops-text, #f5f7fa);
      font-size: 1.06rem;
      font-weight: 900;
    }
    .pos-spec-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

      min-width: 44px;
      min-height: 44px;
      width: 44px;
      height: 44px;
      border: 1px solid rgba(255, 255, 255, .22);
      border-radius: 10px;
      background: rgba(255, 255, 255, .08);
      color: var(--ops-text, #f5f7fa);
      font-size: 1.6rem;
      line-height: 1;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      flex: 0 0 auto;
    }
    .pos-spec-sub {
      margin: 0;
      color: var(--ops-muted, #9aa8b8);
      font-size: .84rem;
      line-height: 1.45;
    }
    .pos-spec-group {
      display: grid;
      gap: 8px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, .08);
      background: rgba(255, 255, 255, .03);
    }
    .pos-spec-group strong {
      font-size: .9rem;
      color: var(--ops-text, #f5f7fa);
      letter-spacing: .03em;
    }
    .pos-spec-options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .pos-spec-option-card {
      min-height: 56px;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, .22);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      color: var(--ops-text, #f5f7fa);
      background: rgba(255, 255, 255, .03);
      cursor: pointer;
      transition: border-color .15s ease, background .15s ease, transform .12s ease;
      user-select: none;
    }
    .pos-spec-option-card:hover {
      border-color: rgba(249, 115, 22, .45);
      background: rgba(249, 115, 22, .08);
    }
    .pos-spec-option-card:active {
      transform: translateY(1px);
    }
    .pos-spec-option-card.selected {
      border: 2px solid #ff6b00;
      background: rgba(255, 107, 0, 0.15);
      color: #fff;
    }
    .pos-spec-error {
      display: none;
      border-radius: 10px;
      padding: 9px 10px;
      border: 1px solid rgba(239, 68, 68, .35);
      background: rgba(239, 68, 68, .16);
      color: #fecaca;
      font-size: .83rem;
      font-weight: 700;
    }
    .pos-spec-error.is-visible {
      display: block;
    }
    .pos-spec-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .pos-spec-btn {
      border: 1px solid rgba(255, 255, 255, .12);
      background: rgba(255, 255, 255, .06);
      color: var(--ops-text, #f5f7fa);
      border-radius: 10px;
      font-size: .9rem;
      font-weight: 800;
      padding: 9px 16px;
      cursor: pointer;
    }
    .pos-spec-btn--primary {
      border-color: rgba(249, 115, 22, .4);
      background: linear-gradient(180deg, rgba(249, 115, 22, .28), rgba(249, 115, 22, .18));
      color: #fff7ed;
    }
    .pos-spec-assign {
      display: grid;
      gap: 8px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.02);
    }
    .pos-spec-assign__row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pos-spec-assign-btn {
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.04);
      color: var(--ops-text, #f5f7fa);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: .84rem;
      font-weight: 800;
      cursor: pointer;
    }
    .pos-spec-assign-btn.is-active {
      border-color: rgba(249, 115, 22, .65);
      background: rgba(249, 115, 22, .18);
      color: #ffedd5;
    }
    .pos-spec-assign select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 9px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(7, 12, 18, .8);
      color: var(--ops-text, #f5f7fa);
    }

    .pos-status-pill {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: .78rem;
      font-weight: 800;
    }
    .pos-status-pill--new { background: rgba(56, 189, 248, .18); color: #bfe9ff; }
    .pos-status-pill--accepted { background: rgba(99, 102, 241, .18); color: #c7d2fe; }
    .pos-status-pill--preparing { background: rgba(249, 115, 22, .16); color: #fed7aa; }
    .pos-status-pill--ready { background: rgba(34, 197, 94, .18); color: #bbf7d0; }
    .pos-status-pill--completed { background: rgba(255, 255, 255, .1); color: #d9e4ef; }
    .pos-status-pill--cancelled { background: rgba(239, 68, 68, .16); color: #fecaca; }

    @media (max-width: 700px) {
      .pos-layout { grid-template-columns: 1fr; }
      .pos-cart { position: static; }
      .pos-part-actions { margin-left: 0; }
      .pos-part-btn--sm { flex: unset; }
      .pos-assign-inline { flex-direction: column; align-items: flex-start; }
      .pos-orders-table { font-size: .8rem; }
      .pos-detail-meta { grid-template-columns: 1fr; }
      .pos-spec-options { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .pos-spec-actions { flex-direction: column-reverse; }
      .pos-spec-btn { width: 100%; }
      .pos-checkout__total { font-size: 1.7rem; }
      .pos-payment-btn { min-height: 54px; }
    }
  </style>
</head>
<body class="ops-page">
  <div id="auth-loading" class="ops-login-guard">正在驗證 POS 員工登入...</div>
  <div class="ops-shell">
    <header class="ops-topbar">
      <div>
        <h1 class="ops-title">POS 現場點餐</h1>
        <div id="ops-store-meta" class="ops-subtitle"></div>
        <div id="ops-user-meta" class="ops-meta"></div>
        <div id="pos-offline-hint" class="ops-meta hidden" style="color:#f59e0b;">目前離線中，將使用本機已登入狀態</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <div id="pos-duty-badge" class="pos-duty-badge" style="display:none;padding:6px 10px;border-radius:999px;background:#eef2ff;color:#3730a3;font-weight:600;font-size:.85rem;">
          <span id="pos-duty-text">目前值班：－</span>
        </div>
        <button id="pos-switch-btn" class="pos-orders-refresh" type="button" title="切換當班員工 (交班)">交班</button>
        <button id="pos-logout-btn" class="pos-orders-refresh" type="button">登出</button>
      </div>
    </header>

    <!-- 交班 Modal -->
    <div id="pos-switch-modal" class="pos-detail-overlay" hidden role="dialog" aria-modal="true" style="display:none;">
      <div class="pos-detail-card" style="max-width:360px;">
        <div class="pos-detail-head">
          <h2 class="pos-detail-title" style="font-size:1.1rem;">交班 / 切換當班員工</h2>
          <button id="pos-switch-close" class="pos-detail-close" type="button">✕</button>
        </div>
        <div class="pos-detail-body" style="padding:16px;">
          <p style="margin:0 0 12px;color:#555;font-size:.9rem;">請輸入下一位員工的帳號與 PIN，驗證通過後將覆蓋當班 session 並同步 KDS。</p>
          <div style="display:grid;gap:10px;">
            <label style="font-size:.85rem;color:#333;">員工編號 (3 碼)
              <input id="pos-switch-empid" inputmode="numeric" pattern="\d{3}" maxlength="3" style="width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px;margin-top:4px;font-size:1rem;" />
            </label>
            <label style="font-size:.85rem;color:#333;">PIN (4 碼)
              <input id="pos-switch-pin" type="password" inputmode="numeric" pattern="\d{4}" maxlength="4" style="width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px;margin-top:4px;font-size:1rem;" />
            </label>
            <div id="pos-switch-error" class="hidden" style="color:#dc2626;font-size:.85rem;"></div>
            <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
              <button id="pos-switch-cancel" class="pos-orders-refresh" type="button">取消</button>
              <button id="pos-switch-confirm" class="pos-orders-refresh" type="button" style="background:#4f46e5;color:#fff;">確認切換</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="auth-error" class="ops-error hidden"></div>

    <div class="pos-tabs">
      <button class="pos-tab-btn is-active" data-tab="order" type="button">點餐</button>
      <button class="pos-tab-btn" data-tab="orders" type="button">今日訂單</button>
    </div>

    <div id="pos-append-banner" class="pos-append-banner hidden">
      <span id="pos-append-banner-text">追加模式：目標訂單 #xxx</span>
      <button id="pos-append-cancel-btn" class="pos-append-banner__cancel" type="button">取消追加模式</button>
    </div>

    <div id="pos-tab-order" class="pos-tab-content is-active">
        <div id="pos-part-bar" class="pos-part-bar">
          <div id="pos-part-list" class="pos-part-list"></div>
          <button id="pos-add-part-btn" class="pos-part-chip pos-part-chip--add" type="button">＋ 新增口味</button>
          <div class="pos-part-actions">
            <button id="pos-assign-toggle-btn" class="pos-part-btn pos-part-btn--sm" type="button" title="將下一個加入的品項指定給特定口味組">套用↗</button>
          </div>
          <div id="pos-assign-inline" class="pos-assign-inline">
            <span class="pos-assign-inline__label">下一個品項指定到：</span>
            <div id="pos-assign-target-chips" class="pos-assign-target-chips"></div>
            <button id="pos-assign-confirm" class="pos-part-btn pos-part-btn--accent" type="button">確認套用</button>
            <button id="pos-assign-cancel" class="pos-part-btn" type="button">取消</button>
          </div>
          <div id="pos-part-hint" class="pos-part-hint"></div>
        </div>
      <div class="pos-layout">
        <div>
          <div id="pos-menu-loading" class="ops-meta">載入菜單中...</div>
          <div id="pos-menu-root"></div>
        </div>

        <aside class="pos-cart">
          <div class="pos-cart__title" id="pos-cart-title">購物車</div>
          <div id="pos-cart-items" class="pos-cart__items">
            <div class="pos-empty">尚未選取品項</div>
          </div>
          <div class="pos-cart__total" id="pos-cart-total">合計：NT$0</div>
          <div id="pos-checkout" class="pos-checkout">
            <div class="pos-checkout__title">結帳</div>
            <div id="pos-checkout-total" class="pos-checkout__total">NT$0</div>
            <div class="pos-payment-methods">
              <button id="pos-payment-cash" class="pos-payment-btn" type="button">現金</button>
              <button id="pos-payment-linepay" class="pos-payment-btn" type="button">Line Pay</button>
            </div>
          </div>

          <div style="margin-bottom:10px;">
            <div class="pos-source-label">訂單來源</div>
            <div class="pos-source-methods">
              <button id="pos-source-walkin" class="pos-payment-btn" type="button">現場顧客</button>
              <button id="pos-source-phone"  class="pos-payment-btn" type="button">電話訂</button>
            </div>
          </div>

          <div class="pos-cart__fields" id="pos-cart-fields">
            <label>顧客稱呼（可不填，預設現場顧客）
              <input id="pos-customer-name" type="text" placeholder="例如 王先生">
            </label>
            <label>LINE ID（可不填，前台推播時可使用）
              <input id="pos-line-user-id" type="text" placeholder="Uxxxxxxxxxxxxxxx">
            </label>
            <label>取餐時間（可不填）
              <input id="pos-pickup-time" type="time">
            </label>
            <label>備註
              <input id="pos-note" type="text" placeholder="可填寫口味或特殊需求">
            </label>
          </div>

          <button class="pos-submit-btn" id="pos-submit-btn" type="button" disabled>確認收款</button>
          <div id="pos-status" class="pos-status" style="display:none"></div>
        </aside>
      </div>
    </div>

    <div id="pos-tab-orders" class="pos-tab-content">
      <div class="pos-orders-toolbar">
        <input id="pos-orders-search" class="pos-orders-search" type="text" placeholder="搜尋訂單編號、取餐號或顧客名稱">
        <button id="pos-orders-refresh" class="pos-orders-refresh" type="button">重新整理訂單</button>
      </div>
      <div id="pos-orders-list">
        <div class="pos-empty">載入中...</div>
      </div>
    </div>
  </div>

  <div id="pos-detail-overlay" class="pos-detail-overlay hidden">
    <div class="pos-detail-card">
      <div class="pos-detail-header">
        <h3 id="pos-detail-title">訂單詳情</h3>
        <button id="pos-detail-close" class="pos-detail-close" type="button">×</button>
      </div>
      <div id="pos-detail-meta" class="pos-detail-meta"></div>
      <div class="pos-detail-items-title">品項明細</div>
      <div id="pos-detail-items"></div>
      <div id="pos-detail-total" class="pos-detail-total"></div>
      <div id="pos-detail-note" class="pos-detail-note hidden"></div>
      <div class="pos-detail-actions">
        <button id="pos-detail-append-btn" class="pos-orders-btn pos-orders-btn--append" type="button">追加品項</button>
        <button id="pos-detail-close2" class="pos-orders-btn pos-orders-btn--view" type="button">關閉</button>
      </div>
    </div>
  </div>

  <div id="pos-spec-overlay" class="pos-spec-overlay hidden">
    <div class="pos-spec-card">
      <div class="pos-spec-header">
        <h3 id="pos-spec-title" class="pos-spec-title">選擇套餐規格</h3>
        <button id="pos-spec-close-top" class="pos-spec-close-top" type="button" aria-label="關閉">×</button>
      </div>
      <p class="pos-spec-sub">請先完成必填規格，再加入購物車。</p>
      <div id="pos-spec-flavor-group" class="pos-spec-group hidden">
        <strong>口味（必選）</strong>
        <div id="pos-spec-flavor-options" class="pos-spec-options"></div>
      </div>
      <div id="pos-spec-staple-group" class="pos-spec-group hidden">
        <strong>主食（必選）</strong>
        <div id="pos-spec-staple-options" class="pos-spec-options"></div>
      </div>
      <div id="pos-spec-assign-group" class="pos-spec-assign hidden">
        <strong>加入方式</strong>
        <div class="pos-spec-assign__row">
          <button id="pos-spec-assign-current" class="pos-spec-assign-btn is-active" type="button">直接加入目前組</button>
          <button id="pos-spec-assign-other" class="pos-spec-assign-btn" type="button">新增一種口味</button>
        </div>
        <select id="pos-spec-assign-target" class="hidden"></select>
      </div>
      <div id="pos-spec-error" class="pos-spec-error"></div>
      <div class="pos-spec-actions">
        <button id="pos-spec-cancel" class="pos-spec-btn" type="button">取消</button>
        <button id="pos-spec-confirm" class="pos-spec-btn pos-spec-btn--primary" type="button">加入購物車</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-functions-compat.js"></script>
  <script>
    window.addEventListener("load", function () {
      var resources = performance.getEntriesByType("resource") || [];
      var jsEntries = resources.filter(function (entry) {
        var name = String(entry.name || "");
        return entry.initiatorType === "script" || /\.js(\?|$)/i.test(name);
      });
      var jsBytes = jsEntries.reduce(function (sum, entry) {
        return sum + Number(entry.transferSize || entry.encodedBodySize || 0);
      }, 0);

      var imageEntries = resources.filter(function (entry) {
        return entry.initiatorType === "img";
      });
      var imageBytes = imageEntries.reduce(function (sum, entry) {
        return sum + Number(entry.transferSize || entry.encodedBodySize || 0);
      }, 0);

      console.log("JS size loaded");
      console.log("[POS_DIAG] resource_summary", {
        jsCount: jsEntries.length,
        jsTotalKB: (jsBytes / 1024).toFixed(2),
        imageCount: imageEntries.length,
        imageTotalKB: (imageBytes / 1024).toFixed(2)
      });
    });
  </script>
  <script src="/config.public.js?v=20260413-1"></script>
  <script src="/order-helpers.js?v=20260418-3"></script>
  <script src="/order-status-labels.js?v=20260418-2"></script>
  <script src="/pos-session.js?v=20260414-1"></script>
  <script src="/ops-session-sync.js?v=20260421-lock-fix2"></script>
  <script src="/order-action-logger.js?v=20260421-lock-fix2"></script>
  <script src="/pos.js?v=20260421-diag1"></script>
</body>
</html>
