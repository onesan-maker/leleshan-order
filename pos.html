<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>樂樂山 POS 現場點餐</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ops.css?v=20260410-4">
  <style>
    /* ── POS Tab Nav ──────────────────────────────────────────── */
    .pos-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 4px;
    }
    .pos-tab-btn {
      min-height: 44px;
      padding: 10px 22px;
      border-radius: 14px;
      font-weight: 800;
      font-size: .95rem;
      color: var(--ops-text);
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .pos-tab-btn.is-active {
      background: rgba(249,115,22,.18);
      border-color: rgba(249,115,22,.38);
      color: #fff5ed;
    }
    .pos-tab-content { display: none; }
    .pos-tab-content.is-active { display: block; }

    /* ── Append Mode Banner ───────────────────────────────────── */
    .pos-append-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 18px;
      border-radius: 16px;
      background: rgba(245,158,11,.16);
      border: 1px solid rgba(245,158,11,.36);
      color: #fde68a;
      font-weight: 700;
      font-size: .92rem;
    }
    .pos-append-banner__cancel {
      padding: 6px 16px;
      border-radius: 10px;
      background: rgba(239,68,68,.18);
      border: 1px solid rgba(239,68,68,.3);
      color: #fecaca;
      font-weight: 800;
      font-size: .85rem;
      cursor: pointer;
      white-space: nowrap;
    }

    /* ── POS Layout ───────────────────────────────────────────── */
    .pos-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 16px;
      align-items: start;
    }

    /* ── Menu Tiles ──────────────────────────────────────────── */
    .pos-menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }
    .pos-menu-tile {
      background: var(--ops-surface-strong, #1f2935);
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 14px 10px;
      cursor: pointer;
      text-align: center;
      transition: border-color .15s, background .15s;
    }
    .pos-menu-tile:hover {
      border-color: var(--ops-accent, #f97316);
      background: rgba(249,115,22,.08);
    }
    .pos-menu-tile--soldout {
      opacity: .45;
      cursor: not-allowed;
      pointer-events: none;
    }
    .pos-menu-tile__name {
      font-weight: 700;
      font-size: .95rem;
      color: var(--ops-text, #f5f7fa);
      line-height: 1.3;
    }
    .pos-menu-tile__price {
      color: var(--ops-accent, #f97316);
      font-size: .85rem;
      font-weight: 700;
      margin-top: 4px;
    }
    .pos-menu-tile__soldout-label {
      display: inline-block;
      margin-top: 4px;
      font-size: .72rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 6px;
      background: rgba(239,68,68,.2);
      color: #fca5a5;
    }

    /* ── Cart ────────────────────────────────────────────────── */
    .pos-cart {
      background: var(--ops-surface, #18202b);
      border: 1px solid var(--ops-border, rgba(255,255,255,.08));
      border-radius: 16px;
      padding: 16px;
      position: sticky;
      top: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .pos-cart__title {
      font-weight: 900;
      font-size: 1.05rem;
      color: var(--ops-text, #f5f7fa);
    }
    .pos-cart__items {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 60px;
    }
    .pos-cart-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .88rem;
      color: var(--ops-text, #f5f7fa);
    }
    .pos-cart-item__name { flex: 1; }
    .pos-cart-item__qty-btn {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 6px;
      width: 26px;
      height: 26px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 700;
      color: var(--ops-text, #f5f7fa);
    }
    .pos-cart-item__qty {
      font-weight: 700;
      min-width: 20px;
      text-align: center;
      color: var(--ops-text, #f5f7fa);
    }
    .pos-cart-item__price {
      color: var(--ops-muted, #9aa8b8);
      white-space: nowrap;
      font-size: .85rem;
    }
    .pos-cart__total {
      font-size: 1.1rem;
      font-weight: 900;
      text-align: right;
      border-top: 1px solid var(--ops-border, rgba(255,255,255,.08));
      padding-top: 10px;
      color: var(--ops-text, #f5f7fa);
    }
    .pos-cart__fields {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .pos-cart__fields label {
      font-size: .82rem;
      font-weight: 700;
      color: var(--ops-muted, #9aa8b8);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .pos-cart__fields input,
    .pos-cart__fields select {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 8px;
      font-size: .9rem;
      box-sizing: border-box;
      background: rgba(7,12,18,.8);
      color: var(--ops-text, #f5f7fa);
    }
    .pos-submit-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(180deg, #fdba74 0%, #f97316 100%);
      color: #1a0f00;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
    }
    .pos-submit-btn:disabled { opacity: .5; cursor: not-allowed; }
    .pos-submit-btn--append {
      background: linear-gradient(180deg, #fde68a 0%, #f59e0b 100%);
      color: #1a0f00;
    }
    .pos-status {
      font-size: .85rem;
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(255,255,255,.06);
      color: var(--ops-text, #f5f7fa);
      text-align: center;
    }
    .pos-status.ok  { background: rgba(34,197,94,.16); color: #bbf7d0; }
    .pos-status.err { background: rgba(239,68,68,.16); color: #fecaca; }
    .pos-section-title {
      font-weight: 700;
      font-size: .8rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--ops-muted, #9aa8b8);
      margin: 14px 0 6px;
    }
    .pos-empty {
      color: var(--ops-muted, #9aa8b8);
      font-size: .85rem;
      text-align: center;
      padding: 10px 0;
    }

    /* ── Orders List ─────────────────────────────────────────── */
    .pos-orders-toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .pos-orders-search {
      flex: 1;
      min-width: 200px;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(7,12,18,.8);
      color: var(--ops-text, #f5f7fa);
      font-size: .9rem;
    }
    .pos-orders-search::placeholder { color: var(--ops-muted, #9aa8b8); }
    .pos-orders-refresh {
      padding: 10px 18px;
      border-radius: 12px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      color: var(--ops-text, #f5f7fa);
      font-weight: 700;
      font-size: .88rem;
      cursor: pointer;
    }
    .pos-orders-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .88rem;
    }
    .pos-orders-table th {
      text-align: left;
      padding: 10px 12px;
      color: var(--ops-muted, #9aa8b8);
      font-weight: 700;
      font-size: .78rem;
      letter-spacing: .04em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--ops-border, rgba(255,255,255,.08));
    }
    .pos-orders-table td {
      padding: 11px 12px;
      color: var(--ops-text, #f5f7fa);
      border-bottom: 1px solid var(--ops-border, rgba(255,255,255,.06));
      vertical-align: middle;
    }
    .pos-orders-table tr:hover td {
      background: rgba(255,255,255,.03);
    }
    .pos-orders-actions {
      display: flex;
      gap: 6px;
      flex-wrap: nowrap;
    }
    .pos-orders-btn {
      padding: 5px 12px;
      border-radius: 8px;
      font-size: .8rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      border: 1px solid transparent;
    }
    .pos-orders-btn--view {
      background: rgba(56,189,248,.14);
      border-color: rgba(56,189,248,.28);
      color: #bae6fd;
    }
    .pos-orders-btn--append {
      background: rgba(245,158,11,.14);
      border-color: rgba(245,158,11,.28);
      color: #fde68a;
    }
    .pos-source-badge {
      display: inline-block;
      font-size: .72rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      color: #fff;
    }
    .pos-source-badge--liff     { background: #06c755; }
    .pos-source-badge--pos      { background: #2c7be5; }
    .pos-source-badge--manual   { background: #888; }
    .pos-source-badge--ubereats { background: #1e9b48; }
    .pos-source-badge--foodpanda{ background: #d40b57; }

    /* ── Order Detail Overlay ────────────────────────────────── */
    .pos-detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.65);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }
    .pos-detail-card {
      background: var(--ops-surface, #18202b);
      border: 1px solid var(--ops-border);
      border-radius: 24px;
      padding: 24px;
      width: 100%;
      max-width: 600px;
      max-height: 85vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .pos-detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .pos-detail-header h3 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 900;
      color: var(--ops-text, #f5f7fa);
    }
    .pos-detail-close {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      width: 36px;
      height: 36px;
      font-size: 1.1rem;
      color: var(--ops-text, #f5f7fa);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pos-detail-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 16px;
      font-size: .88rem;
    }
    .pos-detail-meta-row { display: flex; flex-direction: column; gap: 2px; }
    .pos-detail-meta-label { color: var(--ops-muted, #9aa8b8); font-size: .78rem; font-weight: 700; }
    .pos-detail-meta-val  { color: var(--ops-text, #f5f7fa); font-weight: 600; }
    .pos-detail-items-title {
      font-size: .82rem;
      font-weight: 700;
      color: var(--ops-muted, #9aa8b8);
      letter-spacing: .04em;
      text-transform: uppercase;
      border-top: 1px solid var(--ops-border);
      padding-top: 12px;
    }
    .pos-detail-item {
      display: flex;
      align-items: baseline;
      gap: 8px;
      font-size: .9rem;
      color: var(--ops-text, #f5f7fa);
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .pos-detail-item__qty {
      font-weight: 900;
      color: var(--ops-accent, #f97316);
      min-width: 28px;
    }
    .pos-detail-item__name { flex: 1; }
    .pos-detail-item__price { color: var(--ops-muted, #9aa8b8); font-size: .85rem; white-space: nowrap; }
    .pos-detail-total {
      font-size: 1rem;
      font-weight: 900;
      text-align: right;
      color: var(--ops-text, #f5f7fa);
      border-top: 1px solid var(--ops-border);
      padding-top: 10px;
    }
    .pos-detail-note {
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.06);
      font-size: .88rem;
      color: var(--ops-muted, #9aa8b8);
    }
    .pos-detail-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    /* ── Status Pills ────────────────────────────────────────── */
    .pos-status-pill {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: .78rem;
      font-weight: 800;
    }
    .pos-status-pill--new       { background: rgba(56,189,248,.18);  color: #bfe9ff; }
    .pos-status-pill--accepted  { background: rgba(99,102,241,.18);  color: #c7d2fe; }
    .pos-status-pill--preparing { background: rgba(249,115,22,.16);  color: #fed7aa; }
    .pos-status-pill--ready     { background: rgba(34,197,94,.18);   color: #bbf7d0; }
    .pos-status-pill--completed { background: rgba(255,255,255,.1);  color: #d9e4ef; }
    .pos-status-pill--cancelled { background: rgba(239,68,68,.16);   color: #fecaca; }

    @media (max-width: 700px) {
      .pos-layout { grid-template-columns: 1fr; }
      .pos-cart { position: static; }
      .pos-orders-table { font-size: .8rem; }
      .pos-detail-meta { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="ops-page">
  <div id="auth-loading" class="ops-login-guard">正在驗證員工登入...</div>
  <div class="ops-shell">
    <header class="ops-topbar">
      <div>
        <h1 class="ops-title">POS 現場點餐</h1>
        <div id="ops-store-meta" class="ops-subtitle"></div>
        <div id="ops-user-meta" class="ops-meta"></div>
      </div>
    </header>
    <div id="auth-error" class="ops-error hidden"></div>

    <!-- Tab Navigation -->
    <div class="pos-tabs">
      <button class="pos-tab-btn is-active" data-tab="order" type="button">點餐</button>
      <button class="pos-tab-btn" data-tab="orders" type="button">今日訂單</button>
    </div>

    <!-- Append Mode Banner (hidden by default) -->
    <div id="pos-append-banner" class="pos-append-banner hidden">
      <span id="pos-append-banner-text">追加模式：訂單 #xxx</span>
      <button id="pos-append-cancel-btn" class="pos-append-banner__cancel" type="button">✕ 取消追加</button>
    </div>

    <!-- Tab: 點餐 -->
    <div id="pos-tab-order" class="pos-tab-content is-active">
      <div class="pos-layout">
        <!-- 左側：菜單 -->
        <div>
          <div id="pos-menu-loading" class="ops-meta">載入菜單中...</div>
          <div id="pos-menu-root"></div>
        </div>

        <!-- 右側：購物車 -->
        <aside class="pos-cart">
          <div class="pos-cart__title" id="pos-cart-title">購物車</div>
          <div id="pos-cart-items" class="pos-cart__items">
            <div class="pos-empty">尚未選取品項</div>
          </div>
          <div class="pos-cart__total" id="pos-cart-total">合計：NT$0</div>

          <div class="pos-cart__fields" id="pos-cart-fields">
            <label>顧客稱呼（選填）
              <input id="pos-customer-name" type="text" placeholder="王先生、小美…">
            </label>
            <label>LINE ID（選填，有則發送通知）
              <input id="pos-line-user-id" type="text" placeholder="Uxxxxxxxxxxxxxxx">
            </label>
            <label>取餐時間（選填）
              <input id="pos-pickup-time" type="time">
            </label>
            <label>備註
              <input id="pos-note" type="text" placeholder="少辣、不加蔥…">
            </label>
          </div>

          <button class="pos-submit-btn" id="pos-submit-btn" type="button" disabled>送出訂單</button>
          <div id="pos-status" class="pos-status" style="display:none"></div>
        </aside>
      </div>
    </div>

    <!-- Tab: 今日訂單 -->
    <div id="pos-tab-orders" class="pos-tab-content">
      <div class="pos-orders-toolbar">
        <input id="pos-orders-search" class="pos-orders-search" type="text" placeholder="搜尋訂單號碼或顧客名稱…">
        <button id="pos-orders-refresh" class="pos-orders-refresh" type="button">⟳ 重新整理</button>
      </div>
      <div id="pos-orders-list">
        <div class="pos-empty">載入中…</div>
      </div>
    </div>
  </div>

  <!-- Order Detail Overlay -->
  <div id="pos-detail-overlay" class="pos-detail-overlay hidden">
    <div class="pos-detail-card">
      <div class="pos-detail-header">
        <h3 id="pos-detail-title">訂單詳情</h3>
        <button id="pos-detail-close" class="pos-detail-close" type="button">✕</button>
      </div>
      <div id="pos-detail-meta" class="pos-detail-meta"></div>
      <div class="pos-detail-items-title">品項明細</div>
      <div id="pos-detail-items"></div>
      <div id="pos-detail-total" class="pos-detail-total"></div>
      <div id="pos-detail-note" class="pos-detail-note hidden"></div>
      <div class="pos-detail-actions">
        <button id="pos-detail-append-btn" class="pos-orders-btn pos-orders-btn--append" type="button">＋ 追加品項</button>
        <button id="pos-detail-close2" class="pos-orders-btn pos-orders-btn--view" type="button">關閉</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="/config.js?v=20260403-4"></script>
  <script src="/order-helpers.js?v=20260410-4"></script>
  <script src="/staff-auth.js?v=20260404-1"></script>
  <script src="/pos.js?v=20260410-5"></script>
</body>
</html>
