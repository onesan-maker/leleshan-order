<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>叫號顯示</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Microsoft JhengHei", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #ffffff;
        color: #111111;
      }

      main {
        width: min(92vw, 980px);
        text-align: center;
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(3rem, 10vw, 6rem);
      }

      p {
        margin: 0;
        font-size: clamp(1.5rem, 4vw, 2.4rem);
      }

      button {
        margin-top: 36px;
        padding: 18px 32px;
        border: 0;
        border-radius: 16px;
        background: #111;
        color: #fff;
        font-size: 1.5rem;
        font-weight: 700;
        cursor: pointer;
      }

      #hint {
        margin-top: 16px;
        color: #666;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="call-text">等待叫號</h1>
      <p>請留意現場叫號</p>
      <button id="enable-audio" type="button">啟用聲音</button>
      <p id="hint">點擊後才會播放提示音與語音</p>
    </main>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
      import { doc, getFirestore, onSnapshot } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
      import { firebaseConfig } from "./config.js";

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const callRef = doc(db, "call", "current");

      const callText = document.getElementById("call-text");
      const enableAudioButton = document.getElementById("enable-audio");
      const hint = document.getElementById("hint");
      const dingAudio = new Audio("./ding.mp3");

      let audioEnabled = false;
      let lastNumber = null;

      function updateDisplay(number) {
        callText.textContent = Number.isFinite(number) ? `${number}號請取餐` : "等待叫號";
      }

      async function playFallbackDing() {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;

        if (!AudioContextClass) {
          return;
        }

        const audioContext = new AudioContextClass();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        oscillator.type = "sine";
        oscillator.frequency.value = 880;
        gainNode.gain.value = 0.001;

        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);

        oscillator.start();
        gainNode.gain.exponentialRampToValueAtTime(0.25, audioContext.currentTime + 0.01);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 0.35);
        oscillator.stop(audioContext.currentTime + 0.36);

        await new Promise((resolve) => {
          oscillator.onended = resolve;
        });

        await audioContext.close();
      }

      async function playDing() {
        try {
          dingAudio.currentTime = 0;
          await dingAudio.play();
          await new Promise((resolve) => {
            const done = () => {
              dingAudio.removeEventListener("ended", done);
              resolve();
            };

            dingAudio.addEventListener("ended", done, { once: true });
          });
        } catch (error) {
          await playFallbackDing();
        }
      }

      function speakNumber(number) {
        return new Promise((resolve) => {
          const utterance = new SpeechSynthesisUtterance(`${number}號請取餐`);
          utterance.lang = "zh-TW";
          utterance.rate = 1;
          utterance.onend = resolve;
          utterance.onerror = resolve;
          window.speechSynthesis.cancel();
          window.speechSynthesis.speak(utterance);
        });
      }

      async function announce(number) {
        if (!audioEnabled || !Number.isFinite(number)) {
          return;
        }

        await playDing();
        await speakNumber(number);
      }

      enableAudioButton.addEventListener("click", () => {
        audioEnabled = true;
        hint.textContent = "聲音已啟用";
      });

      onSnapshot(callRef, async (snapshot) => {
        const data = snapshot.data();
        const number = Number.isFinite(data?.number) ? data.number : null;

        updateDisplay(number);

        if (lastNumber === null) {
          lastNumber = number;
          return;
        }

        if (number !== lastNumber) {
          lastNumber = number;
          await announce(number);
        }
      });
    </script>
  </body>
</html>
