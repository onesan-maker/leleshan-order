<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>叫號控制台</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 20px;
        display: grid;
        place-items: center;
        background: #f4f4f4;
        color: #111;
      }

      main {
        width: min(92vw, 560px);
        padding: 32px;
        background: #fff;
        border: 3px solid #111;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin: 0 0 24px;
        font-size: 2.2rem;
        text-align: center;
        font-weight: 800;
      }

      .field-label {
        display: block;
        margin-bottom: 12px;
        font-size: 1.2rem;
        font-weight: 800;
      }

      .stepper {
        display: grid;
        grid-template-columns: minmax(88px, 1fr) minmax(0, 1.45fr) minmax(88px, 1fr);
        gap: 12px;
        align-items: stretch;
      }

      input {
        display: block;
        width: 100%;
        min-width: 0;
        min-height: 96px;
        padding: 18px 14px;
        border: 3px solid #111;
        font-size: clamp(2.75rem, 7vw, 3.4rem);
        font-weight: 800;
        text-align: center;
        line-height: 1.1;
        font-variant-numeric: tabular-nums;
        appearance: none;
        -webkit-appearance: none;
        border-radius: 0;
        overflow: visible;
      }

      button {
        border: 0;
        background: #111;
        color: #fff;
        font-weight: 800;
        cursor: pointer;
      }

      .step-button {
        min-height: 96px;
        font-size: clamp(2.4rem, 6vw, 3rem);
      }

      .call-button {
        width: 100%;
        margin-top: 18px;
        padding: 24px 16px;
        font-size: clamp(1.6rem, 4.5vw, 2rem);
      }

      button:disabled {
        opacity: 0.55;
        cursor: wait;
      }

      p {
        min-height: 1.6em;
        margin: 16px 0 0;
        text-align: center;
        font-size: clamp(1rem, 2.8vw, 1.15rem);
        font-weight: 700;
        line-height: 1.4;
      }

      @media (max-width: 768px) {
        body {
          padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
          align-items: start;
        }

        main {
          width: min(94vw, 520px);
          margin-top: 8px;
          padding: 20px 16px 18px;
          border-width: 2px;
          box-shadow: none;
        }

        h1 {
          margin-bottom: 18px;
          font-size: clamp(1.7rem, 6.8vw, 2.2rem);
        }

        .field-label {
          margin-bottom: 10px;
          font-size: 1rem;
        }

        .stepper {
          grid-template-columns: minmax(74px, 0.95fr) minmax(0, 1.3fr) minmax(74px, 0.95fr);
          gap: 8px;
        }

        input {
          min-height: 84px;
          padding: 14px 10px;
          border-width: 2px;
          font-size: clamp(2.35rem, 12vw, 4rem);
          line-height: 1;
        }

        .step-button {
          min-height: 84px;
          font-size: clamp(2rem, 9vw, 2.8rem);
        }

        .call-button {
          margin-top: 14px;
          min-height: 78px;
          padding: 16px 14px;
          font-size: clamp(1.45rem, 6vw, 1.9rem);
        }

        p {
          margin-top: 14px;
          min-height: 1.5em;
          font-size: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>叫號控制台</h1>
      <label class="field-label" for="call-number">號碼</label>
      <div class="stepper">
        <button id="minus-button" class="step-button" type="button">－</button>
        <input id="call-number" type="text" inputmode="numeric" value="1" aria-label="叫號號碼" />
        <button id="plus-button" class="step-button" type="button">＋</button>
      </div>
      <button id="call-button" class="call-button" type="button">叫號</button>
      <p id="status"></p>
    </main>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
      import {
        doc,
        getFirestore,
        onSnapshot,
        serverTimestamp,
        setDoc,
      } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
      import { firebaseConfig } from "./config.public.js";

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const callRef = doc(db, "call", "current");

      const input = document.getElementById("call-number");
      const minusButton = document.getElementById("minus-button");
      const plusButton = document.getElementById("plus-button");
      const callButton = document.getElementById("call-button");
      const status = document.getElementById("status");
      let isEditing = false;
      let latestRemoteNumber = null;

      function getSafeNumber() {
        const trimmed = input.value.trim();

        if (!/^\d+$/.test(trimmed)) {
          return null;
        }

        return Math.max(1, Number.parseInt(trimmed, 10));
      }

      function setNumber(nextNumber) {
        input.value = String(Math.max(1, nextNumber));
      }

      function setStatusFromRemote(number) {
        status.textContent = Number.isFinite(number) ? `已叫號 ${number} 號` : "";
      }

      function adjustNumber(delta) {
        const current = getSafeNumber() ?? 1;
        setNumber(current + delta);
      }

      async function submitCall() {
        const number = getSafeNumber();

        if (number === null) {
          status.textContent = "請輸入正整數號碼";
          input.focus();
          input.select();
          return;
        }

        setNumber(number);
        callButton.disabled = true;
        status.textContent = "送出中...";

        try {
          await setDoc(callRef, {
            number,
            updatedAt: serverTimestamp(),
          });
        } catch (error) {
          console.error(error);
          status.textContent = "寫入失敗";
        } finally {
          callButton.disabled = false;
        }
      }

      minusButton.addEventListener("click", () => adjustNumber(-1));
      plusButton.addEventListener("click", () => adjustNumber(1));
      callButton.addEventListener("click", submitCall);
      input.addEventListener("focus", () => {
        isEditing = true;
      });
      input.addEventListener("blur", () => {
        isEditing = false;
        if (Number.isFinite(latestRemoteNumber)) {
          setNumber(latestRemoteNumber);
        }
      });
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          submitCall();
        }
      });

      onSnapshot(callRef, (snapshot) => {
        const data = snapshot.data();
        const nextNumber = Number.isFinite(data?.number) ? data.number : null;

        latestRemoteNumber = nextNumber;
        setStatusFromRemote(nextNumber);

        if (!isEditing && Number.isFinite(nextNumber)) {
          setNumber(nextNumber);
        }
      });
    </script>
  </body>
</html>
