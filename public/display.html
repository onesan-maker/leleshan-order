<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>叫號顯示</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #000;
        color: #fff;
      }

      .board {
        min-height: 100vh;
        padding: clamp(16px, 2vw, 28px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: clamp(18px, 2.4vh, 30px);
      }

      .call-wrap {
        width: min(96vw, 1700px);
        flex: 1 1 auto;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .call-text {
        margin: 0;
        width: 100%;
        text-align: center;
        font-size: clamp(4rem, 11vw + 5vh, 12rem);
        line-height: 1.08;
        font-weight: 900;
        letter-spacing: 0.02em;
        overflow-wrap: anywhere;
        transform: scale(1);
        opacity: 1;
      }

      .call-text.call-changed {
        animation: callPulse 1.5s ease-in-out 3;
      }

      .audio-gate {
        flex: 0 0 auto;
        display: flex;
        justify-content: center;
      }

      .audio-button {
        padding: clamp(14px, 1.8vw, 20px) clamp(24px, 3vw, 36px);
        border: 0;
        background: #fff;
        color: #000;
        font-size: clamp(1rem, 1.8vw, 1.45rem);
        line-height: 1;
        font-weight: 800;
        cursor: pointer;
        border-radius: 999px;
      }

      @media (orientation: landscape) {
        .board {
          gap: clamp(10px, 1.5vh, 20px);
        }

        .call-text {
          font-size: clamp(4.8rem, 9vw + 5vh, 13rem);
        }
      }

      @keyframes callPulse {
        0% {
          transform: scale(1);
          opacity: 1;
        }

        50% {
          transform: scale(1.3);
          opacity: 0.6;
        }

        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      .sound-panel {
        position: fixed;
        top: clamp(12px, 2vw, 20px);
        right: clamp(12px, 2vw, 20px);
        z-index: 10;
        width: min(32vw, 280px);
        padding: 12px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(18, 18, 18, 0.82);
        backdrop-filter: blur(8px);
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .control-panel {
        display: none;
      }

      .sound-status {
        margin: 0;
        font-size: 0.95rem;
        line-height: 1.4;
        font-weight: 800;
      }

      .sound-status.status-idle {
        color: #ffb84d;
      }

      .sound-status.status-ok {
        color: #4ade80;
      }

      .sound-status.status-error {
        color: #f87171;
      }

      .sound-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .sound-button {
        flex: 1 1 110px;
        min-height: 40px;
        padding: 10px 12px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        background: #fff;
        color: #000;
        font-size: 0.95rem;
        line-height: 1;
        font-weight: 800;
        cursor: pointer;
      }

      .sound-button.secondary {
        background: transparent;
        color: #fff;
      }

      @media (max-width: 900px) {
        .sound-panel {
          width: min(56vw, 300px);
        }
      }
    </style>
  </head>
  <body>
    <aside class="sound-panel control-panel" aria-live="polite">
      <p id="sound-status" class="sound-status status-idle">聲音未啟用</p>
      <div class="sound-actions">
        <button id="enableAudio" class="sound-button" type="button">啟用聲音</button>
        <button id="testAudio" class="sound-button secondary" type="button">測試音效</button>
      </div>
    </aside>
    <main class="board">
      <section class="call-wrap" aria-live="polite">
        <h1 id="call-text" class="call-text">等待叫號</h1>
      </section>
    </main>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
      import { doc, getFirestore, onSnapshot } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
      import { firebaseConfig } from "./config.public.js";

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const callRef = doc(db, "call", "current");

      const callText = document.getElementById("call-text");
      const soundStatus = document.getElementById("sound-status");
      const enableAudioButton = document.getElementById("enableAudio");
      const testAudioButton = document.getElementById("testAudio");
      const controlPanel = document.querySelector(".control-panel");
      const audioSrc = "/ding.mp3";

      let audioUnlocked = false;
      let lastNumber = null;
      let playbackToken = 0;
      let lastTap = 0;
      let hideTimer = null;

      function renderNumber(number) {
        callText.textContent = Number.isFinite(number) ? `第 ${number} 號請取餐` : "等待叫號";
      }

      function setSoundStatus(type, message) {
        soundStatus.className = `sound-status ${type}`;
        soundStatus.textContent = message;
      }

      function hideControlPanel() {
        controlPanel.style.display = "none";
      }

      function resetAutoHide() {
        if (hideTimer) {
          window.clearTimeout(hideTimer);
        }

        hideTimer = window.setTimeout(() => {
          hideControlPanel();
        }, 10000);
      }

      function showControlPanel() {
        controlPanel.style.display = "flex";
        resetAutoHide();
      }

      function handleTap(event) {
        if (controlPanel.contains(event.target)) {
          return;
        }

        const currentTime = new Date().getTime();
        const tapLength = currentTime - lastTap;

        if (tapLength < 400 && tapLength > 0) {
          showControlPanel();
        }

        lastTap = currentTime;
      }

      function wait(ms) {
        return new Promise((resolve) => {
          window.setTimeout(resolve, ms);
        });
      }

      function triggerCallAnimation() {
        callText.classList.remove("call-changed");
        void callText.offsetWidth;
        callText.classList.add("call-changed");
      }

      async function playSingleDing(contextLabel) {
        const audio = new Audio(audioSrc);
        audio.currentTime = 0;
        console.log("Playing ding.mp3:", audioSrc, "context:", contextLabel);
        await audio.play().catch((error) => {
          console.error("Play failed", error);
          setSoundStatus("status-error", "音效播放失敗，請重新點擊啟用聲音");
          throw error;
        });
        setSoundStatus("status-ok", "聲音已啟用");
      }

      async function playDingSequence() {
        const token = ++playbackToken;

        if (!audioUnlocked) {
          console.warn("Audio not unlocked");
          setSoundStatus("status-idle", "聲音未啟用");
          return;
        }

        for (let index = 0; index < 3; index += 1) {
          if (token !== playbackToken) {
            return;
          }
          await wait(index === 0 ? 0 : 3000);
          if (token !== playbackToken) {
            return;
          }
          try {
            await playSingleDing(`sequence-${index + 1}`);
            console.log("Play ding", index + 1);
          } catch (error) {
            return;
          }
        }
      }

      enableAudioButton.onclick = () => {
        const unlockAudio = new Audio(audioSrc);
        unlockAudio.load();
        unlockAudio.play().then(() => {
          unlockAudio.pause();
          unlockAudio.currentTime = 0;
          audioUnlocked = true;
          console.log("Audio unlocked");
          setSoundStatus("status-ok", "聲音已啟用");
        }).catch((err) => {
          console.error("Unlock failed", err);
          audioUnlocked = false;
          setSoundStatus("status-error", "音效播放失敗，請重新點擊啟用聲音");
        });
      };

      testAudioButton.onclick = async () => {
        if (!audioUnlocked) {
          console.warn("Audio not unlocked");
          setSoundStatus("status-idle", "聲音未啟用");
          return;
        }

        try {
          await playSingleDing("manual-test");
        } catch (error) {
          // Status is already updated in playSingleDing.
        }
      };

      controlPanel.addEventListener("click", () => {
        resetAutoHide();
      });

      controlPanel.addEventListener("touchstart", () => {
        resetAutoHide();
      });

      document.addEventListener("touchend", handleTap);
      document.addEventListener("click", handleTap);

      console.log("ding.mp3 path:", audioSrc);

      onSnapshot(callRef, (snapshot) => {
        const data = snapshot.data();
        const nextNumber = Number.isFinite(data?.number) ? data.number : null;

        if (lastNumber === null) {
          renderNumber(nextNumber);
          lastNumber = nextNumber;
          return;
        }

        if (nextNumber !== lastNumber) {
          lastNumber = nextNumber;
          renderNumber(nextNumber);
          triggerCallAnimation();
          if (Number.isFinite(nextNumber)) {
            playDingSequence();
          }
        }
      });
    </script>
  </body>
</html>
