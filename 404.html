<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - 頁面不存在</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a0d14; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .box { text-align: center; }
    .box h1 { font-size: 64px; margin: 0; color: #f97316; font-weight: 900; }
    .box p { color: #9aa8b8; margin-top: 12px; font-size: 1rem; }
    .box a { color: #f97316; margin-top: 20px; display: inline-block; text-decoration: none; }
  </style>
</head>
<body>
  <div class="box">
    <h1>404</h1>
    <p>此頁面已不存在或已移動</p>
    <a href="/">返回首頁</a>
  </div>
</body>
</html>
